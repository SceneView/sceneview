name: sceneview_flutter_demo
description: Feature showcase for the SceneView Flutter bridge — 3D and AR.
version: 4.6.2
publish_to: 'none'

environment:
  sdk: '>=3.0.0 <4.0.0'
  flutter: '>=3.10.0'

dependencies:
  flutter:
    sdk: flutter
  sceneview_flutter:
    path: ../../flutter/sceneview_flutter
  http: ^1.2.0
  # Auto-update — checked on every AppLifecycleState.resumed via
  # lib/services/update_checker.dart. Android delegates to Play In-App Updates
  # (`in_app_update`); iOS hits `itunes.apple.com/lookup` over `http` and
  # bounces to the App Store via `url_launcher`. `package_info_plus` reads
  # the running app's CFBundleShortVersionString / versionName.
  in_app_update: ^4.2.3
  url_launcher: ^6.2.5
  package_info_plus: ^8.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  integration_test:
    sdk: flutter

flutter:
  uses-material-design: true

  assets:
    - environments/
