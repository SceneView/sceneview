name: Regenerate iOS Provisioning Profile

# One-shot maintenance workflow: matches the cert embedded in the
# IOS_BUILD_CERTIFICATE_BASE64 secret with its App Store Connect entry,
# then deletes + recreates the "SceneView Demo App Store" profile so it
# (a) carries that exact cert and (b) picks up the latest capabilities
# (in particular the Associated Domains entitlement added in 932ac8dc).
# The base64 of the new profile is uploaded as a private artifact; the
# operator pulls it locally and updates IOS_PROVISIONING_PROFILE_BASE64
# with `gh secret set`. Delete this file once the App Store deploy
# pipeline is stable (TestFlight upload of v4.0.3+ succeeds).

on:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: regenerate-ios-profile
  cancel-in-progress: false

jobs:
  regenerate:
    runs-on: macos-15
    timeout-minutes: 15
    steps:
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install --quiet "PyJWT[crypto]" requests

      - name: Extract the cert SHA-1 from the IOS_BUILD_CERTIFICATE_BASE64 secret
        id: cert
        env:
          BUILD_CERTIFICATE_BASE64: ${{ secrets.IOS_BUILD_CERTIFICATE_BASE64 }}
          P12_PASSWORD: ${{ secrets.IOS_BUILD_CERTIFICATE_PASSWORD }}
        run: |
          set -e
          CERT_PATH="$RUNNER_TEMP/cert.p12"
          PEM_PATH="$RUNNER_TEMP/cert.pem"
          echo -n "$BUILD_CERTIFICATE_BASE64" | base64 --decode -o "$CERT_PATH"

          # Extract the public certificate as PEM, then read its SHA-1 fingerprint
          # (this matches the `sha1` attribute on App Store Connect's /v1/certificates).
          openssl pkcs12 -legacy -in "$CERT_PATH" -clcerts -nokeys -passin "pass:$P12_PASSWORD" -out "$PEM_PATH" 2>/dev/null \
            || openssl pkcs12 -in "$CERT_PATH" -clcerts -nokeys -passin "pass:$P12_PASSWORD" -out "$PEM_PATH"

          SHA1=$(openssl x509 -in "$PEM_PATH" -fingerprint -sha1 -noout | tr -d ':' | cut -d= -f2 | tr 'a-f' 'A-F')
          CN=$(openssl x509 -in "$PEM_PATH" -subject -noout | sed -n 's/.*CN *= *\([^,]*\).*/\1/p')
          echo "cert_sha1=$SHA1" >> "$GITHUB_OUTPUT"
          echo "cert_cn=$CN" >> "$GITHUB_OUTPUT"
          echo "P12 cert: CN=$CN  SHA1=$SHA1"

      - name: Add ASSOCIATED_DOMAINS capability + regenerate profile bound to the P12 cert
        env:
          ASC_KEY_ID: ${{ secrets.APP_STORE_CONNECT_KEY_ID }}
          ASC_ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_ISSUER_ID }}
          ASC_API_KEY: ${{ secrets.APP_STORE_CONNECT_API_KEY }}
          P12_CERT_SHA1: ${{ steps.cert.outputs.cert_sha1 }}
          P12_CERT_CN: ${{ steps.cert.outputs.cert_cn }}
        run: |
          mkdir -p ~/.private_keys
          echo "$ASC_API_KEY" > ~/.private_keys/AuthKey_${ASC_KEY_ID}.p8

          python3 <<'PYEOF'
          import os, time, jwt, requests, sys, base64

          KEY_ID = os.environ["ASC_KEY_ID"]
          ISSUER_ID = os.environ["ASC_ISSUER_ID"]
          P12_SHA1 = os.environ["P12_CERT_SHA1"].upper()
          P12_CN = os.environ["P12_CERT_CN"]
          BUNDLE_ID = "io.github.sceneview.demo"
          PROFILE_NAME = "SceneView Demo App Store"
          PROFILE_TYPE = "IOS_APP_STORE"

          with open(os.path.expanduser(f"~/.private_keys/AuthKey_{KEY_ID}.p8")) as f:
              private_key = f.read()

          token = jwt.encode(
              {"iss": ISSUER_ID, "iat": int(time.time()), "exp": int(time.time()) + 1200, "aud": "appstoreconnect-v1"},
              private_key,
              algorithm="ES256",
              headers={"kid": KEY_ID},
          )
          headers = {"Authorization": f"Bearer {token}", "Content-Type": "application/json"}
          BASE = "https://api.appstoreconnect.apple.com/v1"

          def fail(msg, resp=None):
              print(f"::error::{msg}")
              if resp is not None:
                  print(f"  status={resp.status_code} body={resp.text[:1000]}")
              sys.exit(1)

          # --- 1. Find the bundle ID + its capabilities
          r = requests.get(
              f"{BASE}/bundleIds",
              headers=headers,
              params={"filter[identifier]": BUNDLE_ID, "include": "bundleIdCapabilities", "limit": 1},
          )
          if r.status_code != 200:
              fail("Failed to query bundleIds", r)
          if not r.json()["data"]:
              fail(f"Bundle ID {BUNDLE_ID} not found")
          bid = r.json()["data"][0]["id"]
          existing_caps = {
              c["attributes"]["capabilityType"]
              for c in r.json().get("included", [])
              if c["type"] == "bundleIdCapabilities"
          }
          print(f"Bundle ID: {bid}")
          print(f"Existing capabilities: {sorted(existing_caps)}")

          # --- 2. Add ASSOCIATED_DOMAINS if missing
          if "ASSOCIATED_DOMAINS" not in existing_caps:
              payload = {"data": {
                  "type": "bundleIdCapabilities",
                  "attributes": {"capabilityType": "ASSOCIATED_DOMAINS"},
                  "relationships": {"bundleId": {"data": {"type": "bundleIds", "id": bid}}},
              }}
              r = requests.post(f"{BASE}/bundleIdCapabilities", headers=headers, json=payload)
              if r.status_code not in (200, 201):
                  fail("Failed to enable ASSOCIATED_DOMAINS capability", r)
              print("ASSOCIATED_DOMAINS enabled")
          else:
              print("ASSOCIATED_DOMAINS already enabled")

          # --- 3. Pick the cert that matches the P12 SHA-1 fingerprint
          all_certs = []
          page_url = f"{BASE}/certificates?limit=200"
          while page_url:
              r = requests.get(page_url, headers=headers)
              if r.status_code != 200:
                  fail("Failed to list certificates", r)
              data = r.json()
              all_certs.extend(data["data"])
              page_url = data.get("links", {}).get("next")

          print(f"Found {len(all_certs)} certificates")
          for c in all_certs:
              a = c["attributes"]
              ours = a.get("certificateContent")
              ours_sha1 = "?"
              if ours:
                  try:
                      pem = base64.b64decode(ours)
                      # Pull SHA-1 from the certificateContent. ASC stores it DER-encoded.
                      from hashlib import sha1
                      ours_sha1 = sha1(pem).hexdigest().upper()
                  except Exception as e:
                      pass
              print(f"  - id={c['id']} type={a['certificateType']:20s} name={a.get('name', '?'):40s} sha1(content)={ours_sha1}")

          # The "real" SHA-1 we want to match against is the X.509 fingerprint from
          # the P12 — which is sha1 of the DER-encoded certificate (not the PEM).
          # ASC's `certificateContent` IS the DER bytes, base64-encoded. So
          # sha1(base64decode(certificateContent)) === the openssl fingerprint.
          matched = []
          for c in all_certs:
              a = c["attributes"]
              cc = a.get("certificateContent")
              if not cc:
                  continue
              from hashlib import sha1
              h = sha1(base64.b64decode(cc)).hexdigest().upper()
              if h == P12_SHA1:
                  matched.append(c)

          if not matched:
              # Fallback: match by common name (less precise but still helpful)
              for c in all_certs:
                  if P12_CN and P12_CN in c["attributes"].get("name", ""):
                      matched.append(c)
              if matched:
                  print(f"::warning::No SHA-1 match — falling back to CN match for {P12_CN!r}")
              else:
                  fail(f"No App Store Connect certificate matches the P12 cert (CN={P12_CN!r}, SHA1={P12_SHA1}). "
                       "Either re-upload IOS_BUILD_CERTIFICATE_BASE64 with a current Distribution cert, "
                       "or generate a new Apple Distribution cert in the developer portal.")
          if len(matched) > 1:
              print(f"::warning::Multiple certs match — picking the most recent: {[c['id'] for c in matched]}")
          chosen = matched[0]
          chosen_id = chosen["id"]
          print(f"Selected cert: id={chosen_id} type={chosen['attributes']['certificateType']} name={chosen['attributes'].get('name')}")

          # --- 4. Drop the old profile (if any) and create a fresh one bound to the chosen cert
          r = requests.get(
              f"{BASE}/profiles",
              headers=headers,
              params={"filter[name]": PROFILE_NAME, "limit": 200},
          )
          if r.status_code != 200:
              fail("Failed to list profiles", r)
          for old in r.json()["data"]:
              r2 = requests.delete(f"{BASE}/profiles/{old['id']}", headers=headers)
              if r2.status_code not in (200, 204):
                  print(f"::warning::Failed to delete old profile {old['id']}: {r2.status_code}")
              else:
                  print(f"Deleted old profile {old['id']}")

          payload = {"data": {
              "type": "profiles",
              "attributes": {"name": PROFILE_NAME, "profileType": PROFILE_TYPE},
              "relationships": {
                  "bundleId": {"data": {"type": "bundleIds", "id": bid}},
                  "certificates": {"data": [{"type": "certificates", "id": chosen_id}]},
              },
          }}
          r = requests.post(f"{BASE}/profiles", headers=headers, json=payload)
          if r.status_code not in (200, 201):
              fail("Failed to create profile", r)
          new = r.json()["data"]
          new_b64 = new["attributes"]["profileContent"]
          print(f"New profile id={new['id']} name={new['attributes']['name']!r} cert={chosen_id}")

          out_path = "/tmp/profile.b64"
          with open(out_path, "w") as f:
              f.write(new_b64)
          print(f"Profile content written to {out_path} ({len(new_b64)} chars)")
          PYEOF

          rm -rf ~/.private_keys

      - name: Verify base64 file
        run: |
          if [ ! -s /tmp/profile.b64 ]; then
            echo "::error::/tmp/profile.b64 missing or empty"
            exit 1
          fi
          echo "Profile base64 size: $(wc -c < /tmp/profile.b64) chars"

      - name: Upload profile artifact (private to repo)
        uses: actions/upload-artifact@v4
        with:
          name: ios-provisioning-profile-base64
          path: /tmp/profile.b64
          retention-days: 1
          if-no-files-found: error
