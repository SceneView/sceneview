name: Deploy iOS App to App Store

# PREREQUISITES (manual actions):
# 1. Create an iOS Distribution certificate in Apple Developer portal
# 2. Export it as .p12 WITH a password
# 3. base64 encode it: base64 -i certificate.p12 | pbcopy
# 4. Set GitHub secrets:
#    - IOS_BUILD_CERTIFICATE_BASE64: the base64 string from step 3
#    - IOS_BUILD_CERTIFICATE_PASSWORD: the password from step 2
#    - IOS_PROVISIONING_PROFILE_BASE64: base64-encoded .mobileprovision (iOS)
#    - MACOS_PROVISIONING_PROFILE_BASE64: base64-encoded .provisionprofile (macOS)
#    - APP_STORE_CONNECT_KEY_ID, APP_STORE_CONNECT_ISSUER_ID, APP_STORE_CONNECT_API_KEY

on:
  push:
    branches: [main]
    tags: ['v*']
    # The `paths` filter applies to BOTH branch and tag pushes — i.e. a tag
    # push must also touch one of these paths to trigger. Every release
    # commit in this repo bumps `gradle.properties:VERSION_NAME` and adds an
    # entry to `CHANGELOG.md` (per the Version Location Map in CLAUDE.md), so
    # those two paths act as a "release commit always touches at least one
    # of these" anchor that guarantees every clean release tag fires the
    # workflow even if the iOS source itself didn't change in that PR.
    paths:
      - 'SceneViewSwift/**'
      - 'samples/ios-demo/**'
      - '.github/workflows/app-store.yml'
      - 'gradle.properties'
      - 'CHANGELOG.md'
  workflow_dispatch:
    inputs:
      submit_for_review:
        description: "Auto-submit the uploaded build for App Store review (TestFlight upload always runs)"
        required: false
        default: "false"
        type: choice
        options:
          - "false"
          - "true"

concurrency:
  group: app-store-deploy
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  check:
    name: Check prerequisites
    runs-on: ubuntu-latest
    outputs:
      ios_ready: ${{ steps.secrets.outputs.ios_ready }}
      macos_ready: ${{ steps.secrets.outputs.macos_ready }}
    steps:
      - name: Check if secrets are configured
        id: secrets
        env:
          HAS_CERT: ${{ secrets.IOS_BUILD_CERTIFICATE_BASE64 != '' }}
          HAS_PASS: ${{ secrets.IOS_BUILD_CERTIFICATE_PASSWORD != '' }}
          HAS_IOS_PROF: ${{ secrets.IOS_PROVISIONING_PROFILE_BASE64 != '' }}
          HAS_MACOS_PROF: ${{ secrets.MACOS_PROVISIONING_PROFILE_BASE64 != '' }}
          HAS_KEY: ${{ secrets.APP_STORE_CONNECT_KEY_ID != '' }}
        run: |
          if [ "$HAS_CERT" = "true" ] && [ "$HAS_PASS" = "true" ] && [ "$HAS_IOS_PROF" = "true" ] && [ "$HAS_KEY" = "true" ]; then
            echo "ios_ready=true" >> $GITHUB_OUTPUT
            echo "iOS secrets configured"
          else
            echo "ios_ready=false" >> $GITHUB_OUTPUT
            echo "::notice::Skipping iOS deploy — signing secrets not configured."
          fi
          if [ "$HAS_CERT" = "true" ] && [ "$HAS_PASS" = "true" ] && [ "$HAS_MACOS_PROF" = "true" ] && [ "$HAS_KEY" = "true" ]; then
            echo "macos_ready=true" >> $GITHUB_OUTPUT
            echo "macOS secrets configured"
          else
            echo "macos_ready=false" >> $GITHUB_OUTPUT
            echo "::notice::Skipping macOS deploy — signing secrets not configured."
          fi

  deploy-ios:
    name: Build & Upload iOS to TestFlight
    needs: check
    if: needs.check.outputs.ios_ready == 'true'
    runs-on: macos-15
    timeout-minutes: 60
    defaults:
      run:
        working-directory: samples/ios-demo

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Select Xcode
        run: |
          sudo xcode-select -s /Applications/Xcode_26.3.app/Contents/Developer 2>/dev/null \
            || sudo xcode-select -s /Applications/Xcode_26.2.app/Contents/Developer 2>/dev/null \
            || sudo xcode-select -s /Applications/Xcode_26.1.1.app/Contents/Developer 2>/dev/null \
            || sudo xcode-select -s /Applications/Xcode_26.0.1.app/Contents/Developer 2>/dev/null \
            || sudo xcode-select -s /Applications/Xcode.app/Contents/Developer
          echo "Using Xcode: $(xcode-select -p)"
          xcodebuild -version

      - name: Install the Apple certificate and provisioning profile
        env:
          BUILD_CERTIFICATE_BASE64: ${{ secrets.IOS_BUILD_CERTIFICATE_BASE64 }}
          P12_PASSWORD: ${{ secrets.IOS_BUILD_CERTIFICATE_PASSWORD }}
          BUILD_PROVISION_PROFILE_BASE64: ${{ secrets.IOS_PROVISIONING_PROFILE_BASE64 }}
          KEYCHAIN_PASSWORD: ${{ github.run_id }}_${{ github.run_attempt }}
        run: |
          CERTIFICATE_PATH=$RUNNER_TEMP/build_certificate.p12
          PROFILE_PATH=$RUNNER_TEMP/build_pp.mobileprovision
          KEYCHAIN_PATH=$RUNNER_TEMP/app-signing.keychain-db

          echo -n "$BUILD_CERTIFICATE_BASE64" | base64 --decode -o $CERTIFICATE_PATH
          echo -n "$BUILD_PROVISION_PROFILE_BASE64" | base64 --decode -o $PROFILE_PATH

          if ! openssl pkcs12 -in "$CERTIFICATE_PATH" -passin "pass:$P12_PASSWORD" -nokeys -noout 2>/dev/null; then
            echo "::error::P12 password verification failed."
            exit 1
          fi

          security create-keychain -p "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH
          security set-keychain-settings -lut 21600 $KEYCHAIN_PATH
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH
          security import $CERTIFICATE_PATH -P "$P12_PASSWORD" -A -t cert -f pkcs12 -k $KEYCHAIN_PATH
          security set-key-partition-list -S apple-tool:,apple: -k "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH
          security list-keychain -d user -s $KEYCHAIN_PATH

          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
          PROFILE_UUID=$(/usr/libexec/PlistBuddy -c "Print UUID" /dev/stdin <<< $(/usr/bin/security cms -D -i $PROFILE_PATH))
          cp $PROFILE_PATH ~/Library/MobileDevice/Provisioning\ Profiles/$PROFILE_UUID.mobileprovision
          echo "PROVISIONING_PROFILE_UUID=$PROFILE_UUID" >> $GITHUB_ENV

      - name: Stage App Store Connect API key
        env:
          APP_STORE_CONNECT_API_KEY_ID: ${{ secrets.APP_STORE_CONNECT_KEY_ID }}
          APP_STORE_CONNECT_API_KEY: ${{ secrets.APP_STORE_CONNECT_API_KEY }}
        run: |
          mkdir -p ~/.private_keys
          echo "$APP_STORE_CONNECT_API_KEY" > ~/.private_keys/AuthKey_${APP_STORE_CONNECT_API_KEY_ID}.p8
          chmod 600 ~/.private_keys/AuthKey_${APP_STORE_CONNECT_API_KEY_ID}.p8

      - name: Cache Swift Package dependencies
        uses: actions/cache@v5
        with:
          path: samples/ios-demo/SourcePackages
          key: spm-${{ runner.os }}-${{ hashFiles('samples/ios-demo/SceneViewDemo.xcodeproj/project.xcworkspace/xcshareddata/swiftpm/Package.resolved') }}
          restore-keys: spm-${{ runner.os }}-

      - name: Resolve Swift Package dependencies
        run: |
          xcodebuild -resolvePackageDependencies \
            -scheme SceneViewDemo \
            -project SceneViewDemo.xcodeproj \
            -clonedSourcePackagesDirPath SourcePackages

      - name: Build archive
        run: |
          xcodebuild archive \
            -project SceneViewDemo.xcodeproj \
            -scheme SceneViewDemo \
            -destination 'generic/platform=iOS' \
            -archivePath $RUNNER_TEMP/SceneViewDemo.xcarchive \
            -clonedSourcePackagesDirPath SourcePackages \
            -skipPackagePluginValidation \
            -skipMacroValidation \
            -allowProvisioningUpdates \
            ONLY_ACTIVE_ARCH=NO \
            CODE_SIGN_STYLE=Manual \
            CODE_SIGN_IDENTITY="Apple Distribution" \
            DEVELOPMENT_TEAM=5G3DZ3TH45 \
            PROVISIONING_PROFILE_SPECIFIER="$PROVISIONING_PROFILE_UUID" \
            ASSETCATALOG_COMPILER_GENERATE_ASSET_SYMBOLS=NO

      - name: Export IPA and upload to TestFlight
        env:
          APP_STORE_CONNECT_API_KEY_ID: ${{ secrets.APP_STORE_CONNECT_KEY_ID }}
          APP_STORE_CONNECT_API_ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_ISSUER_ID }}
        run: |
          cat > $RUNNER_TEMP/ExportOptions.plist << PLIST
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>method</key>
            <string>app-store-connect</string>
            <key>destination</key>
            <string>upload</string>
            <key>signingStyle</key>
            <string>manual</string>
            <key>teamID</key>
            <string>5G3DZ3TH45</string>
            <key>provisioningProfiles</key>
            <dict>
              <key>io.github.sceneview.demo</key>
              <string>$PROVISIONING_PROFILE_UUID</string>
            </dict>
          </dict>
          </plist>
          PLIST

          xcodebuild -exportArchive \
            -archivePath $RUNNER_TEMP/SceneViewDemo.xcarchive \
            -exportOptionsPlist $RUNNER_TEMP/ExportOptions.plist \
            -exportPath $RUNNER_TEMP/export \
            -allowProvisioningUpdates \
            -authenticationKeyPath ~/.private_keys/AuthKey_${APP_STORE_CONNECT_API_KEY_ID}.p8 \
            -authenticationKeyID $APP_STORE_CONNECT_API_KEY_ID \
            -authenticationKeyIssuerID $APP_STORE_CONNECT_API_ISSUER_ID

      - name: Submit build for App Store review
        # Auto-submit on:
        #   - explicit workflow_dispatch with submit_for_review=true (legacy
        #     manual gate)
        #   - tag push starting with `v` (new — aligns with Android
        #     play-store.yml's tag-push behaviour that auto-publishes to
        #     production track + matches the implicit "tag = release"
        #     semantics across the whole repo)
        #
        # Branch pushes to `main` still upload to TestFlight only — Apple
        # review-submission is reserved for explicit release tags.
        if: |
          (github.event_name == 'workflow_dispatch' && inputs.submit_for_review == 'true') ||
          (github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v'))
        env:
          ASC_KEY_ID: ${{ secrets.APP_STORE_CONNECT_KEY_ID }}
          ASC_ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_ISSUER_ID }}
          # versionString for the App Store record. For a tag push we read it
          # from the tag name (`refs/tags/v4.2.0` → `4.2.0`); otherwise we fall
          # back to the SDK version declared in `gradle.properties` so manual
          # workflow_dispatch from main still picks the latest committed
          # version instead of a stale hardcoded constant.
          ASC_VERSION_STRING: ${{ startsWith(github.ref, 'refs/tags/v') && format('{0}', github.ref_name) || '' }}
        run: |
          python3 -m venv $RUNNER_TEMP/asc-venv
          $RUNNER_TEMP/asc-venv/bin/pip install "PyJWT[crypto]" requests --quiet

          # Wait for Apple to process the build
          echo "Waiting 120s for Apple to process the build..."
          sleep 120

          $RUNNER_TEMP/asc-venv/bin/python3 << 'PYEOF'
          import os, json, time, jwt, requests

          KEY_ID = os.environ["ASC_KEY_ID"]
          ISSUER_ID = os.environ["ASC_ISSUER_ID"]
          BUNDLE_ID = "io.github.sceneview.demo"

          key_path = os.path.expanduser(f"~/.private_keys/AuthKey_{KEY_ID}.p8")
          with open(key_path) as f:
              private_key = f.read()

          token = jwt.encode(
              {"iss": ISSUER_ID, "iat": int(time.time()), "exp": int(time.time()) + 1200, "aud": "appstoreconnect-v1"},
              private_key,
              algorithm="ES256",
              headers={"kid": KEY_ID}
          )
          headers = {"Authorization": f"Bearer {token}", "Content-Type": "application/json"}
          BASE = "https://api.appstoreconnect.apple.com/v1"

          # 1. Find the app
          r = requests.get(f"{BASE}/apps?filter[bundleId]={BUNDLE_ID}", headers=headers)
          r.raise_for_status()
          app_id = r.json()["data"][0]["id"]
          print(f"App ID: {app_id}")

          # 2. Get the latest valid build
          r = requests.get(f"{BASE}/builds?filter[app]={app_id}&sort=-uploadedDate&limit=1&filter[processingState]=VALID", headers=headers)
          builds = r.json().get("data", [])
          if not builds:
              print("No valid build found yet — still processing. Skipping submission.")
              exit(0)
          build_id = builds[0]["id"]
          build_version = builds[0]["attributes"]["version"]
          print(f"Latest build: {build_version} (ID: {build_id})")

          # Resolve the App Store version string. Tag pushes set
          # ASC_VERSION_STRING via env (e.g. "v4.2.0"). Drop the leading "v"
          # via `removeprefix` (Py 3.9+, exact single-occurrence strip — we
          # don't want `lstrip("v")` which would eat any number of leading
          # v's). Fall back to the build's own version (which xcodebuild
          # stamps from the Marketing Version field — itself bumped per
          # release) when ASC_VERSION_STRING is empty (manual
          # workflow_dispatch case).
          #
          # Apple's versionString validator accepts only clean `X` or `X.Y`
          # or `X.Y.Z` — pre-release suffixes like `4.2.0-rc.1` are rejected
          # at the appStoreVersions POST with HTTP 409. The release tagger
          # in this repo only cuts clean semver tags so this isn't a
          # present issue, but if a future RC flow lands, the resolution
          # below would need a stripping step.
          version_string = (os.environ.get("ASC_VERSION_STRING") or "").removeprefix("v")
          if not version_string:
              version_string = build_version
          print(f"Target App Store versionString: {version_string}")

          # 3. Get or create the app store version
          r = requests.get(f"{BASE}/apps/{app_id}/appStoreVersions?filter[appStoreState]=PREPARE_FOR_SUBMISSION,READY_FOR_REVIEW", headers=headers)
          versions = r.json().get("data", [])
          # Pick a version record that already targets our versionString,
          # otherwise fall back to the first editable one if any, otherwise
          # create a new record. Picking by versionString avoids the
          # previously-hardcoded "4.0.3" trap where any unrelated editable
          # version would get hijacked for an unrelated build.
          version_id = None
          for v in versions:
              if v.get("attributes", {}).get("versionString") == version_string:
                  version_id = v["id"]
                  print(f"Using matching version record: {version_id}")
                  break
          if not version_id:
              payload = {
                  "data": {
                      "type": "appStoreVersions",
                      "attributes": {"platform": "IOS", "versionString": version_string},
                      "relationships": {"app": {"data": {"type": "apps", "id": app_id}}}
                  }
              }
              r = requests.post(f"{BASE}/appStoreVersions", headers=headers, json=payload)
              r.raise_for_status()
              version_id = r.json()["data"]["id"]
              print(f"Created new version record: {version_id} ({version_string})")

          # 4. Attach the build to the version
          payload = {"data": {"type": "builds", "id": build_id}}
          r = requests.patch(f"{BASE}/appStoreVersions/{version_id}/relationships/build", headers=headers, json=payload)
          print(f"Build attached: {r.status_code}")

          # 5. Submit for review
          payload = {
              "data": {
                  "type": "appStoreVersionSubmissions",
                  "relationships": {"appStoreVersion": {"data": {"type": "appStoreVersions", "id": version_id}}}
              }
          }
          r = requests.post(f"{BASE}/appStoreVersionSubmissions", headers=headers, json=payload)
          if r.status_code in (200, 201):
              print("Successfully submitted for App Store review!")
          else:
              print(f"Submission response: {r.status_code} - {r.text[:500]}")
          PYEOF
        continue-on-error: true

      - name: Clean up keychain and keys
        if: always()
        run: |
          security delete-keychain $RUNNER_TEMP/app-signing.keychain-db 2>/dev/null || true
          rm -rf ~/.private_keys 2>/dev/null || true

  deploy-macos:
    name: Build & Upload macOS to App Store
    needs: check
    if: needs.check.outputs.macos_ready == 'true'
    runs-on: macos-15
    timeout-minutes: 60
    defaults:
      run:
        working-directory: samples/ios-demo

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Select Xcode
        run: |
          sudo xcode-select -s /Applications/Xcode_26.3.app/Contents/Developer 2>/dev/null \
            || sudo xcode-select -s /Applications/Xcode_26.2.app/Contents/Developer 2>/dev/null \
            || sudo xcode-select -s /Applications/Xcode_26.1.1.app/Contents/Developer 2>/dev/null \
            || sudo xcode-select -s /Applications/Xcode_26.0.1.app/Contents/Developer 2>/dev/null \
            || sudo xcode-select -s /Applications/Xcode.app/Contents/Developer
          echo "Using Xcode: $(xcode-select -p)"
          xcodebuild -version

      - name: Install the Apple certificate and provisioning profile
        env:
          BUILD_CERTIFICATE_BASE64: ${{ secrets.IOS_BUILD_CERTIFICATE_BASE64 }}
          P12_PASSWORD: ${{ secrets.IOS_BUILD_CERTIFICATE_PASSWORD }}
          BUILD_PROVISION_PROFILE_BASE64: ${{ secrets.MACOS_PROVISIONING_PROFILE_BASE64 }}
          KEYCHAIN_PASSWORD: ${{ github.run_id }}_${{ github.run_attempt }}
        run: |
          CERTIFICATE_PATH=$RUNNER_TEMP/build_certificate.p12
          PROFILE_PATH=$RUNNER_TEMP/build_pp.provisionprofile
          KEYCHAIN_PATH=$RUNNER_TEMP/app-signing.keychain-db

          echo -n "$BUILD_CERTIFICATE_BASE64" | base64 --decode -o $CERTIFICATE_PATH
          echo -n "$BUILD_PROVISION_PROFILE_BASE64" | base64 --decode -o $PROFILE_PATH

          if ! openssl pkcs12 -in "$CERTIFICATE_PATH" -passin "pass:$P12_PASSWORD" -nokeys -noout 2>/dev/null; then
            echo "::error::P12 password verification failed."
            exit 1
          fi

          security create-keychain -p "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH
          security set-keychain-settings -lut 21600 $KEYCHAIN_PATH
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH
          security import $CERTIFICATE_PATH -P "$P12_PASSWORD" -A -t cert -f pkcs12 -k $KEYCHAIN_PATH
          security set-key-partition-list -S apple-tool:,apple: -k "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH
          security list-keychain -d user -s $KEYCHAIN_PATH

          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
          PROFILE_UUID=$(/usr/libexec/PlistBuddy -c "Print UUID" /dev/stdin <<< $(/usr/bin/security cms -D -i $PROFILE_PATH))
          cp $PROFILE_PATH ~/Library/MobileDevice/Provisioning\ Profiles/$PROFILE_UUID.provisionprofile
          echo "PROVISIONING_PROFILE_UUID=$PROFILE_UUID" >> $GITHUB_ENV

      - name: Cache Swift Package dependencies
        uses: actions/cache@v5
        with:
          path: samples/ios-demo/SourcePackages
          key: spm-macos-${{ runner.os }}-${{ hashFiles('samples/ios-demo/SceneViewDemo.xcodeproj/project.xcworkspace/xcshareddata/swiftpm/Package.resolved') }}
          restore-keys: spm-macos-${{ runner.os }}-

      - name: Resolve Swift Package dependencies
        run: |
          xcodebuild -resolvePackageDependencies \
            -scheme SceneViewDemo \
            -project SceneViewDemo.xcodeproj \
            -clonedSourcePackagesDirPath SourcePackages

      - name: Build archive
        run: |
          xcodebuild archive \
            -project SceneViewDemo.xcodeproj \
            -scheme SceneViewDemo \
            -destination 'generic/platform=macOS' \
            -archivePath $RUNNER_TEMP/SceneViewDemo-macOS.xcarchive \
            -clonedSourcePackagesDirPath SourcePackages \
            -skipPackagePluginValidation \
            -skipMacroValidation \
            -allowProvisioningUpdates \
            CODE_SIGN_STYLE=Manual \
            CODE_SIGN_IDENTITY="Apple Distribution" \
            DEVELOPMENT_TEAM=5G3DZ3TH45 \
            PROVISIONING_PROFILE_SPECIFIER="$PROVISIONING_PROFILE_UUID" \
            ASSETCATALOG_COMPILER_GENERATE_ASSET_SYMBOLS=NO

      - name: Export and upload to App Store
        env:
          APP_STORE_CONNECT_API_KEY_ID: ${{ secrets.APP_STORE_CONNECT_KEY_ID }}
          APP_STORE_CONNECT_API_ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_ISSUER_ID }}
          APP_STORE_CONNECT_API_KEY: ${{ secrets.APP_STORE_CONNECT_API_KEY }}
        run: |
          mkdir -p ~/.private_keys
          echo "$APP_STORE_CONNECT_API_KEY" > ~/.private_keys/AuthKey_${APP_STORE_CONNECT_API_KEY_ID}.p8

          cat > $RUNNER_TEMP/ExportOptions-macOS.plist << PLIST
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>method</key>
            <string>app-store-connect</string>
            <key>destination</key>
            <string>upload</string>
            <key>signingStyle</key>
            <string>manual</string>
            <key>teamID</key>
            <string>5G3DZ3TH45</string>
            <key>provisioningProfiles</key>
            <dict>
              <key>io.github.sceneview.demo</key>
              <string>$PROVISIONING_PROFILE_UUID</string>
            </dict>
          </dict>
          </plist>
          PLIST

          xcodebuild -exportArchive \
            -archivePath $RUNNER_TEMP/SceneViewDemo-macOS.xcarchive \
            -exportOptionsPlist $RUNNER_TEMP/ExportOptions-macOS.plist \
            -exportPath $RUNNER_TEMP/export-macos \
            -allowProvisioningUpdates \
            -authenticationKeyPath ~/.private_keys/AuthKey_${APP_STORE_CONNECT_API_KEY_ID}.p8 \
            -authenticationKeyID $APP_STORE_CONNECT_API_KEY_ID \
            -authenticationKeyIssuerID $APP_STORE_CONNECT_API_ISSUER_ID

      - name: Clean up keychain and keys
        if: always()
        run: |
          security delete-keychain $RUNNER_TEMP/app-signing.keychain-db 2>/dev/null || true
          rm -rf ~/.private_keys 2>/dev/null || true
