name: Daily Maintenance

on:
  schedule:
    - cron: '0 7 * * *'   # 07:00 UTC every day
  workflow_dispatch:

permissions:
  contents: read

jobs:
  # ── 1. Dependency version check ───────────────────────────────────────────
  check-deps:
    name: Check dependency versions
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
      issues: write
    steps:
      - uses: actions/checkout@v6

      - name: Fetch latest versions
        id: versions
        run: |
          FILAMENT_LATEST=$(curl -sf https://api.github.com/repos/google/filament/releases/latest | jq -r .tag_name | tr -d 'v' || echo "unknown")
          ARCORE_LATEST=$(curl -sf https://api.github.com/repos/google-ar/arcore-android-sdk/releases/latest | jq -r .tag_name | tr -d 'v' || echo "unknown")
          KOTLIN_LATEST=$(curl -sf https://api.github.com/repos/JetBrains/kotlin/releases/latest | jq -r .tag_name | tr -d 'v' || echo "unknown")

          FILAMENT_CURRENT=$(grep '^filament ' gradle/libs.versions.toml 2>/dev/null | head -1 | grep -o '[0-9]\+\.[0-9]\+\.[0-9]\+' || echo "unknown")
          KOTLIN_CURRENT=$(grep '^kotlin ' gradle/libs.versions.toml 2>/dev/null | head -1 | grep -o '[0-9]\+\.[0-9]\+\.[0-9]\+' || echo "unknown")
          ARCORE_CURRENT=$(grep '^arCore ' gradle/libs.versions.toml 2>/dev/null | grep -o '[0-9]\+\.[0-9]\+\.[0-9]\+' | head -1 || echo "unknown")

          echo "filament_latest=$FILAMENT_LATEST" >> $GITHUB_OUTPUT
          echo "filament_current=$FILAMENT_CURRENT" >> $GITHUB_OUTPUT
          echo "arcore_latest=$ARCORE_LATEST" >> $GITHUB_OUTPUT
          echo "arcore_current=$ARCORE_CURRENT" >> $GITHUB_OUTPUT
          echo "kotlin_latest=$KOTLIN_LATEST" >> $GITHUB_OUTPUT
          echo "kotlin_current=$KOTLIN_CURRENT" >> $GITHUB_OUTPUT

      - name: Report dependency status and open issue if outdated
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          FILAMENT_CURRENT="${{ steps.versions.outputs.filament_current }}"
          FILAMENT_LATEST="${{ steps.versions.outputs.filament_latest }}"
          ARCORE_CURRENT="${{ steps.versions.outputs.arcore_current }}"
          ARCORE_LATEST="${{ steps.versions.outputs.arcore_latest }}"
          KOTLIN_CURRENT="${{ steps.versions.outputs.kotlin_current }}"
          KOTLIN_LATEST="${{ steps.versions.outputs.kotlin_latest }}"

          echo "## Dependency status -- $(date +%Y-%m-%d)"
          printf "| %-12s | %-10s | %-10s | %-8s |\n" "Dependency" "Current" "Latest" "Status"
          printf "|%s|%s|%s|%s|\n" "$(printf '%0.s-' {1..14})" "$(printf '%0.s-' {1..12})" "$(printf '%0.s-' {1..12})" "$(printf '%0.s-' {1..10})"

          OUTDATED=()

          if [ "$FILAMENT_CURRENT" != "unknown" ] && [ "$FILAMENT_LATEST" != "unknown" ] && [ "$FILAMENT_CURRENT" != "$FILAMENT_LATEST" ]; then
            printf "| %-12s | %-10s | %-10s | %-8s |\n" "Filament" "$FILAMENT_CURRENT" "$FILAMENT_LATEST" "OUTDATED"
            OUTDATED+=("Filament $FILAMENT_CURRENT -> $FILAMENT_LATEST")
          else
            printf "| %-12s | %-10s | %-10s | %-8s |\n" "Filament" "$FILAMENT_CURRENT" "$FILAMENT_LATEST" "ok"
          fi

          if [ "$ARCORE_CURRENT" != "unknown" ] && [ "$ARCORE_LATEST" != "unknown" ] && [ "$ARCORE_CURRENT" != "$ARCORE_LATEST" ]; then
            printf "| %-12s | %-10s | %-10s | %-8s |\n" "ARCore" "$ARCORE_CURRENT" "$ARCORE_LATEST" "OUTDATED"
            OUTDATED+=("ARCore $ARCORE_CURRENT -> $ARCORE_LATEST")
          else
            printf "| %-12s | %-10s | %-10s | %-8s |\n" "ARCore" "$ARCORE_CURRENT" "$ARCORE_LATEST" "ok"
          fi

          if [ "$KOTLIN_CURRENT" != "unknown" ] && [ "$KOTLIN_LATEST" != "unknown" ] && [ "$KOTLIN_CURRENT" != "$KOTLIN_LATEST" ]; then
            printf "| %-12s | %-10s | %-10s | %-8s |\n" "Kotlin" "$KOTLIN_CURRENT" "$KOTLIN_LATEST" "OUTDATED"
            OUTDATED+=("Kotlin $KOTLIN_CURRENT -> $KOTLIN_LATEST")
          else
            printf "| %-12s | %-10s | %-10s | %-8s |\n" "Kotlin" "$KOTLIN_CURRENT" "$KOTLIN_LATEST" "ok"
          fi

          if [ ${#OUTDATED[@]} -gt 0 ]; then
            OUTDATED_LIST=$(printf '%s\n' "${OUTDATED[@]}")
            ISSUE_TITLE="Dependency updates available -- $(date +%Y-%m-%d)"
            EXISTING=$(gh issue list --state open --search "Dependency updates available" --json number --jq '.[0].number' 2>/dev/null || echo "")
            if [ -z "$EXISTING" ]; then
              gh issue create \
                --title "$ISSUE_TITLE" \
                --body "Automated maintenance detected outdated dependencies on $(date +%Y-%m-%d):

          $OUTDATED_LIST

          Please evaluate each upgrade for compatibility with the current SceneView API surface." \
                || echo "::warning::Could not create dependency issue"
            else
              echo "Dependency issue #$EXISTING already exists -- skipping."
            fi
          fi

  # ── 2. Stale issue detection ───────────────────────────────────────────────
  stale:
    name: Mark stale issues
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      issues: write
      pull-requests: write
    steps:
      - uses: actions/stale@v10
        with:
          stale-issue-message: >
            This issue has been open for 30 days with no activity.
            If it is still relevant, please leave a comment — otherwise it will be closed in 7 days.
          close-issue-message: >
            Closing due to inactivity. Feel free to reopen if the issue is still relevant.
          stale-pr-message: >
            This PR has been open for 30 days with no activity.
            Please rebase and update — it will be closed in 7 days if there is no response.
          days-before-stale: 30
          days-before-close: 7
          exempt-issue-labels: 'pinned,roadmap,in-progress'
          exempt-pr-labels: 'pinned'

  # ── 3. SceneView agent skill drift ────────────────────────────────────────
  # Catches the case where a library API was renamed/removed between releases
  # without updating `agents/sceneview/` (the published agent skill). Daily
  # cadence is enough — the same check also runs on every PR via ci.yml's
  # `repo-hygiene` job.
  skill-drift:
    name: SceneView agent skill drift
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: read
      issues: write
    steps:
      - uses: actions/checkout@v6

      - name: Run skill drift check
        id: drift
        shell: bash
        run: |
          if bash .claude/scripts/check-sceneview-skill.sh > skill-drift.log 2>&1; then
            echo "drift=0" >> $GITHUB_OUTPUT
          else
            echo "drift=1" >> $GITHUB_OUTPUT
            cat skill-drift.log
          fi

      - name: Open or update tracking issue
        if: steps.drift.outputs.drift == '1'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          EXISTING=$(gh issue list --state open --search "Agent skill drift detected" --json number --jq '.[0].number' 2>/dev/null || echo "")
          BODY=$'Daily maintenance detected drift between `agents/sceneview/` and the SceneView library source.\n\n```\n'"$(cat skill-drift.log)"$'\n```\n\nRun `bash .claude/scripts/check-sceneview-skill.sh` locally and update the skill from real demos / `llms.txt`.'
          if [ -z "$EXISTING" ]; then
            gh issue create \
              --title "Agent skill drift detected — $(date +%Y-%m-%d)" \
              --body "$BODY" \
              --label "agent-skill,maintenance" \
              || echo "::warning::Could not create skill drift issue"
          else
            gh issue comment "$EXISTING" --body "$BODY" \
              || echo "::warning::Could not comment on existing skill drift issue #$EXISTING"
          fi

  # ── 4. CI health summary ──────────────────────────────────────────────────
  ci-health:
    name: CI health check
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: read
      issues: write
    steps:
      - uses: actions/checkout@v6

      - name: Check recent CI runs
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          # Only count failures from the 'build' job (not flaky ar-emulator)
          FAILURES=$(gh run list --workflow=ci.yml --limit 7 --json conclusion,createdAt,name \
            | jq '[.[] | select(.conclusion == "failure")] | length')
          echo "CI failures in last 7 runs: $FAILURES"
          # Raised threshold: ar-emulator is continue-on-error so only
          # true build failures count now. Threshold = 4 to avoid noise.
          if [ "$FAILURES" -gt 4 ]; then
            echo "::warning::CI is consistently failing -- $FAILURES failures in last 7 runs"
            EXISTING=$(gh issue list --state open --search "CI health:" --json number --jq '.[0].number' 2>/dev/null || echo "")
            if [ -z "$EXISTING" ]; then
              gh issue create \
                --title "CI health: $FAILURES failures in last 7 runs -- $(date +%Y-%m-%d)" \
                --body "Automated maintenance detected $FAILURES CI failures in the last 7 runs. Please investigate the ci.yml workflow." \
                || echo "::warning::Could not create CI health issue"
            else
              echo "CI health issue #$EXISTING already open -- skipping duplicate."
            fi
          else
            echo "CI health OK ($FAILURES/7 failures)"
          fi

  # ── 5. Structured maintenance digest (report-only /maintain mirror) ───────
  # Reproduces the *observable* signals of the `/maintain` Claude Code skill
  # (CI health, open issues/PRs, dependency drift, version sync, quality
  # signals, release decision) as a single structured report. It is strictly
  # READ-ONLY — the skill itself takes actions (commits, labels, AVD rebuilds)
  # which are unsafe to run unattended in CI, so this job only observes.
  # Output goes to the step-summary AND a single auto-updated tracking issue
  # so the digest is browsable day to day. Non-blocking: the report script
  # always exits 0, and the issue post is best-effort.
  maintenance-report:
    name: Daily maintenance digest
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
      issues: write       # post/update the digest tracking issue
      pull-requests: read # the script counts open PRs
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0    # release decision needs the full tag history

      - name: Generate maintenance digest
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          bash .claude/scripts/maintenance-report.sh -o maintenance-report.md

      - name: Post or update tracking issue
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          DIGEST_TITLE="Daily maintenance digest"
          BODY="$(cat maintenance-report.md)"
          # Find an existing open digest issue (best-effort).
          EXISTING=$(gh issue list --state open --search "$DIGEST_TITLE in:title" \
            --label maintenance --json number --jq '.[0].number' 2>/dev/null || echo "")
          if [ -z "$EXISTING" ]; then
            gh issue create \
              --title "$DIGEST_TITLE" \
              --body "$BODY" \
              --label "maintenance,ci" \
              || echo "::warning::Could not create maintenance digest issue"
          else
            # Overwrite the body so the issue always shows the latest digest,
            # and add a short dated comment so the history stays visible.
            gh issue edit "$EXISTING" --body "$BODY" \
              || echo "::warning::Could not update digest issue #$EXISTING"
            gh issue comment "$EXISTING" \
              --body "Digest refreshed — $(date -u +%Y-%m-%d). See the issue body for the latest table." \
              || echo "::warning::Could not comment on digest issue #$EXISTING"
          fi

  # ── 6. Stale claude/* branch cleanup ──────────────────────────────────────
  # An orchestrator marathon leaves dozens of merged `claude/*` branches on
  # `origin`. This job deletes the ones that are provably dead — fully merged
  # into origin/main (ahead=0) OR carrying a MERGED PR (squash-merge case) —
  # in a SINGLE `git push --delete` call. Branches with an OPEN PR or genuine
  # unmerged commits are never touched. Worktrees are skipped (they only
  # exist on local checkouts, not in CI).
  branch-cleanup:
    name: Prune merged claude/* branches
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: write       # git push --delete
      pull-requests: read   # gh pr view (open-PR guard)
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0    # full history — ahead-count needs all refs

      - name: Prune merged remote branches
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          # --yes  : perform the deletion (merged == dead, safe to act).
          # --no-worktrees : CI has no .claude/worktrees/ checkouts.
          # The script's own guards (current branch, ahead>0, open PR)
          # protect every branch that still carries live work.
          bash .claude/scripts/cleanup-branches-worktrees.sh --yes --no-worktrees
