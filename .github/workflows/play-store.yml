name: Deploy Demo to Play Store

# Release-checkpoint deploy — tag-only.
#
# Trigger             → tracks
# ─────────────────────────────────────────────────────────────────────
# push of v* tag      → internal + production (clean release like 4.0.2)
# manual dispatch     → user chooses
#
# Why tag-only (#1321):
#
# - The repo runs a continuous high-merge-rate issue cycle (dozens of
#   merges/day). Building + uploading an AAB on every push to main
#   spent ~12 min of runner time per merge and churned the internal
#   track with snapshots nobody installed.
# - Production is reserved for **stable releases** (semver tags) and a
#   tag push targets BOTH internal AND production, so internal testers
#   still get the clean release the moment the tag lands — they no
#   longer lag, they just no longer get a snapshot per merge.
# - Mirrors `app-store.yml` (tag-only after #1318) and `release.yml`.
# - A tag push runs through Google review (1-3 days) and replaces the
#   previous public build.
#
# To deploy an interim build between releases, use `workflow_dispatch`
# below and pick the desired track.

on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'
  workflow_dispatch:
    inputs:
      track:
        description: 'Play Store track. `auto` matches the push behaviour (internal for branches, internal+production for tags).'
        required: true
        default: 'auto'
        type: choice
        options:
          - auto
          - internal+production
          - production
          - beta
          - alpha
          - internal

# Only one Play Store deploy at a time.
concurrency:
  group: play-store-deploy
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  build:
    name: Build release AAB
    runs-on: ubuntu-latest
    timeout-minutes: 45
    outputs:
      version_code: ${{ steps.version.outputs.code }}
      version_name: ${{ steps.version.outputs.name }}
      # 'true' iff `versionName` matches a clean `X.Y.0` (major or minor
      # bump). Drives the `sync-listing` job's gate so we don't push the
      # store-listing copy on every patch release. Snapshots (`X.Y.Z-sha`)
      # and patches (`X.Y.1+`) both come out 'false'.
      is_minor_bump: ${{ steps.version.outputs.is_minor_bump }}
      tracks: ${{ steps.tracks.outputs.tracks }}

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0  # Full history for version calculation

      - uses: ./.github/actions/setup-gradle

      # Auto-versioning:
      #   versionCode = run_number (always increasing)
      #   versionName = - "X.Y.Z" when HEAD is exactly on a release tag (clean public version)
      #                 - "X.Y.Z-<short_sha>" when on main past the latest tag (snapshot)
      #                 - "YYYY.MM.DD-<short_sha>" when there is no tag yet
      - name: Calculate version
        id: version
        run: |
          VERSION_CODE=${{ github.run_number }}
          EXACT_TAG=$(git describe --tags --exact-match HEAD 2>/dev/null || echo "")
          if [ -n "$EXACT_TAG" ]; then
            VERSION_NAME="${EXACT_TAG#v}"
          else
            TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "")
            if [ -n "$TAG" ]; then
              VERSION_NAME="${TAG#v}-$(git rev-parse --short HEAD)"
            else
              VERSION_NAME="$(date +%Y.%m.%d)-$(git rev-parse --short HEAD)"
            fi
          fi
          echo "code=$VERSION_CODE" >> $GITHUB_OUTPUT
          echo "name=$VERSION_NAME" >> $GITHUB_OUTPUT

          # Detect a clean minor/major bump (`X.Y.0`). `endsWith(ref, '.0')`
          # in a GHA `if:` expression mis-matches `v4.3.10` — using a real
          # bash regex here closes that hole.
          if [[ "$VERSION_NAME" =~ ^[0-9]+\.[0-9]+\.0$ ]]; then
            echo "is_minor_bump=true" >> $GITHUB_OUTPUT
          else
            echo "is_minor_bump=false" >> $GITHUB_OUTPUT
          fi
          echo "Version: $VERSION_NAME ($VERSION_CODE)"

      # Track selection logic for the matrix in the publish job:
      #   - tag push (v*.*.*)                          → ["internal","production"]
      #   - branch push (snapshot)                     → ["internal"]
      #   - manual dispatch with explicit single track → that track only
      #   - manual dispatch with `internal+production` → both
      #   - manual dispatch with `auto`                → falls back to push semantics
      #
      # Tag pushes target BOTH internal AND production so internal testers (the
      # release author's phone, beta partners) get the clean release on their
      # device the moment the tag is pushed — instead of waiting 1-3 days for
      # the Google review of the production track to complete.
      #
      # ONE AAB is built and uploaded to the FIRST track in the matrix list
      # (always 'internal' for tag pushes). Subsequent tracks ('production'
      # for tag pushes) are populated via the Play Edits API PROMOTION
      # endpoint — the SAME versionCode is added to a second track without
      # re-uploading the AAB (Google Play rejects re-uploads of the same
      # versionCode but cheerfully accepts promotions). See the publish job's
      # "Promote internal release to ${{ matrix.track }}" step.
      #
      # Matrix list ORDER matters: 'internal' must be first so the upload
      # completes before the promote runs. `max-parallel: 1` + the array
      # order below is the only ordering guarantee — GitHub Actions doesn't
      # spec matrix expansion order in writing, but empirically follows JSON
      # array order. If GHA ever reorders, the promote step's "release not
      # found" branch fails loudly with a clear message rather than silently
      # mis-deploying.
      - name: Compute target tracks
        id: tracks
        run: |
          INPUT_TRACK='${{ github.event.inputs.track }}'
          if [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ -n "$INPUT_TRACK" ] && [ "$INPUT_TRACK" != "auto" ]; then
            if [ "$INPUT_TRACK" = "internal+production" ]; then
              TRACKS='["internal","production"]'
            else
              TRACKS="[\"$INPUT_TRACK\"]"
            fi
          elif [[ '${{ github.ref }}' == refs/tags/v* ]]; then
            TRACKS='["internal","production"]'
          else
            TRACKS='["internal"]'
          fi
          echo "tracks=$TRACKS" >> $GITHUB_OUTPUT
          echo "Will publish to: $TRACKS"

      - name: Validate keystore secret
        env:
          KEYSTORE_BASE64: ${{ secrets.UPLOAD_KEYSTORE_BASE64 }}
        run: |
          if [ -z "$KEYSTORE_BASE64" ]; then
            echo "::error::UPLOAD_KEYSTORE_BASE64 secret is not set. Cannot build release AAB."
            exit 1
          fi

      - name: Decode keystore
        env:
          KEYSTORE_BASE64: ${{ secrets.UPLOAD_KEYSTORE_BASE64 }}
        run: echo "$KEYSTORE_BASE64" | base64 -d > samples/android-demo/release.keystore

      - name: Verify ARCore Cloud key wiring (#1177)
        env:
          ARCORE_API_KEY: ${{ secrets.ARCORE_API_KEY }}
        run: bash .claude/scripts/verify-arcore-key.sh

      - name: Build release AAB
        env:
          SCENEVIEW_DEMO_KEYSTORE_FILE: release.keystore
          SCENEVIEW_DEMO_KEYSTORE_PASSWORD: ${{ secrets.UPLOAD_KEYSTORE_PASSWORD }}
          SCENEVIEW_DEMO_KEY_ALIAS: ${{ secrets.UPLOAD_KEY_ALIAS }}
          SCENEVIEW_DEMO_KEY_PASSWORD: ${{ secrets.UPLOAD_KEY_PASSWORD }}
          # Required for Streetscape Geometry / Geospatial / Cloud Anchors demos.
          # See samples/android-demo/build.gradle manifestPlaceholders.
          ARCORE_API_KEY: ${{ secrets.ARCORE_API_KEY }}
          # Optional. When unset, the Explore tab's Sketchfab gallery silently
          # falls back to bundled featured models. See
          # samples/android-demo/.../sketchfab/ for the BuildConfig wiring.
          SKETCHFAB_API_KEY: ${{ secrets.SKETCHFAB_API_KEY }}
        run: |
          build_aab() {
            ./gradlew :samples:android-demo:bundleRelease \
              -PversionCode=${{ steps.version.outputs.code }} \
              -PversionName=${{ steps.version.outputs.name }}
          }
          aab_ok() {
            local aab
            aab=$(ls samples/android-demo/build/outputs/bundle/release/*.aab 2>/dev/null | head -n1)
            [ -n "$aab" ] && [ -s "$aab" ] && unzip -tq "$aab" >/dev/null 2>&1
          }
          # An .aab is a zip. A truncated / zero-byte artifact from a flaky
          # runner (seen on v4.6.0 + v4.6.1, #1412/#1415) sails past gradle's
          # exit 0 and only blows up at upload — a lost release. Verify zip
          # integrity here and rebuild once from clean if the artifact is
          # unreadable, so a transient I/O flake never costs a release.
          build_aab
          if ! aab_ok; then
            echo "::warning::release AAB missing or corrupt after first build — cleaning and rebuilding once"
            ./gradlew :samples:android-demo:clean
            build_aab
            aab_ok || { echo "::error::release AAB still corrupt after a clean rebuild — aborting"; exit 1; }
          fi

      # Manifest validation gate (#1301) — fail fast on a stale or wrong-variant
      # AAB before it reaches the Play Store. Asserts the built bundle's
      # package / versionName / versionCode match what gradle was told to build,
      # so a misconfigured artifact is caught here (~1 s) instead of as a Play
      # Console rejection minutes later.
      #
      # An `.aab` is an Android App Bundle, NOT an APK — `aapt2` cannot read
      # one (it reads APKs), so the validator uses `bundletool dump manifest`,
      # the correct tool for bundles. A pre-upload guard must never block a
      # release: `continue-on-error: true` guarantees that even a script crash
      # or a tooling gap can never veto the upload (#1416). The script itself
      # also only exits non-zero on a genuine manifest mismatch and skips
      # cleanly when its tooling is unavailable.
      - name: Validate AAB manifest before upload
        continue-on-error: true
        env:
          EXPECT_PKG: io.github.sceneview.demo
          EXPECT_NAME: ${{ steps.version.outputs.name }}
          EXPECT_CODE: ${{ steps.version.outputs.code }}
        run: |
          AAB=$(ls samples/android-demo/build/outputs/bundle/release/*.aab | head -n1)
          bash .claude/scripts/validate-release-artifact.sh \
            "$AAB" "$EXPECT_PKG" "$EXPECT_NAME" "$EXPECT_CODE"

      - name: Upload AAB artifact
        uses: actions/upload-artifact@v7
        with:
          name: sceneview-demo-${{ steps.version.outputs.name }}
          path: samples/android-demo/build/outputs/bundle/release/*.aab
          if-no-files-found: error
          retention-days: 30

      - name: Clean up keystore
        if: always()
        run: rm -f samples/android-demo/release.keystore

  publish:
    name: Publish to ${{ matrix.track }}
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 15

    # Track list comes from the build job — see its `Compute target tracks` step.
    #
    # `max-parallel: 1` serialises the matrix entries because Google's Edits
    # API gives every editing session a single Edit ID per app — when two
    # parallel jobs both upload-and-commit to the same packageName they race
    # for that ID, one finishes first, and the other returns "This Edit has
    # been deleted" because the Edit it was holding got committed-and-discarded
    # by its sibling. Running the tracks sequentially eliminates the race.
    # Total wall time is ~50 s × N tracks (vs ~50 s in the rare parallel-works
    # case), well within budget.
    strategy:
      fail-fast: false
      max-parallel: 1
      matrix:
        track: ${{ fromJSON(needs.build.outputs.tracks) }}

    steps:
      - name: Checkout (for CHANGELOG.md → whatsnew extraction)
        uses: actions/checkout@v6

      - name: Download AAB artifact
        uses: actions/download-artifact@v7
        with:
          name: sceneview-demo-${{ needs.build.outputs.version_name }}
          path: aab

      # Populate Play Store's "What's new in this version" from the matching
      # `## vX.Y.Z` section in CHANGELOG.md. Writes a single
      # `whatsnew/whatsnew-en-US` file consumed by `r0adkll/upload-google-play`
      # via `whatsNewDirectory:`. Snapshot builds (version_name like
      # `4.4.0-abcd1234`) strip the suffix to find the base release section.
      #
      # Google Play caps "What's new" at 500 characters per locale — we truncate
      # with a trailing ellipsis if longer. If the section isn't found (e.g.
      # release-cut hasn't moved `## Unreleased` to `## vX.Y.Z` yet), we leave
      # the file absent so the action skips notes rather than uploading the
      # version string only.
      - name: Extract release notes for Play Store
        id: notes
        env:
          VERSION_NAME: ${{ needs.build.outputs.version_name }}
        run: |
          set -euo pipefail
          # Strip the snapshot suffix (`4.4.0-abcd1234` → `4.4.0`) — only the
          # canonical release lives in CHANGELOG.md.
          BASE_VERSION="${VERSION_NAME%-*}"
          mkdir -p whatsnew
          # `ver` interpolates into a regex inside awk — the dots in `4.3.1`
          # would otherwise match any character (so `## v4-3-1` would also
          # hit). `gsub` escapes them before use. Same hygiene applied in
          # app-store.yml's submission script.
          awk -v ver="## v$BASE_VERSION" '
            BEGIN { gsub(/\./, "\\.", ver) }
            $0 ~ "^"ver"( |$)"   { found=1; next }
            found && /^## v[0-9]/ { exit }
            found                 { print }
          ' CHANGELOG.md > whatsnew/raw.md || true

          if [ ! -s whatsnew/raw.md ]; then
            echo "::warning::No '## v$BASE_VERSION' section in CHANGELOG.md — Play Store 'What's new' will be left empty"
            rm -rf whatsnew
            echo "extracted=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          # Strip markdown → plain text (stores render literally). Order matters:
          # links first (`[label](url)` → `label`), then bold/italic/code, then
          # heading hashes, then squeeze blank-line runs.
          python3 - << 'PYEOF' > whatsnew/whatsnew-en-US
          import re, sys
          text = open('whatsnew/raw.md').read()
          text = re.sub(r'\[([^\]]+)\]\([^)]+\)', r'\1', text)   # [label](url) → label
          text = re.sub(r'\*\*([^*]+)\*\*', r'\1', text)         # **bold** → bold
          text = re.sub(r'`([^`]+)`', r'\1', text)               # `code` → code
          text = re.sub(r'^#{1,6}\s*', '', text, flags=re.M)     # leading ###
          text = re.sub(r'\n{3,}', '\n\n', text)                 # squeeze blank lines
          text = text.strip()
          if len(text) > 500:
              text = text[:497].rstrip() + '…'
          sys.stdout.write(text)
          PYEOF
          rm -f whatsnew/raw.md
          echo "extracted=true" >> "$GITHUB_OUTPUT"
          echo "What's new payload ($(wc -c < whatsnew/whatsnew-en-US) chars):"
          cat whatsnew/whatsnew-en-US

      # Two-mode publish:
      #
      # 1) If this is the FIRST destination (matrix.track == 'internal'), or
      #    if 'internal' isn't part of the matrix at all (single-track manual
      #    dispatch to production / alpha / beta), upload the AAB directly via
      #    r0adkll. This creates a Play Console release with versionCode N on
      #    matrix.track.
      #
      # 2) Else (matrix.track != 'internal' AND 'internal' is in the matrix),
      #    PROMOTE the just-uploaded internal release to matrix.track. The
      #    promote call goes through the same Edits API r0adkll uses but only
      #    adds the existing versionCode N to a new track — no second AAB upload,
      #    no second versionCode collision (Google Play rejects the same code
      #    on a second upload, but cheerfully accepts it as a promotion).
      #
      # max-parallel: 1 + the matrix list order [internal, production] from
      # `Compute target tracks` ensures the internal upload completes before
      # the production promote runs.
      - name: Publish to Play Store (${{ matrix.track }}) — direct upload
        if: matrix.track == 'internal' || !contains(needs.build.outputs.tracks, '"internal"')
        uses: r0adkll/upload-google-play@v1.1.5
        with:
          serviceAccountJsonPlainText: ${{ secrets.PLAY_STORE_SERVICE_ACCOUNT_JSON }}
          packageName: io.github.sceneview.demo
          releaseFiles: aab/*.aab
          track: ${{ matrix.track }}
          status: completed
          # `whatsNewDirectory` is read at action time — passing the literal
          # path is safe even when the dir is missing (the action skips notes).
          # The promote step downstream re-reads `releaseNotes` from the source
          # track, so populating internal once propagates to production.
          whatsNewDirectory: ${{ steps.notes.outputs.extracted == 'true' && 'whatsnew' || '' }}

      - name: Promote internal release to ${{ matrix.track }}
        if: matrix.track != 'internal' && contains(needs.build.outputs.tracks, '"internal"')
        env:
          SERVICE_ACCOUNT_JSON: ${{ secrets.PLAY_STORE_SERVICE_ACCOUNT_JSON }}
          PACKAGE_NAME: io.github.sceneview.demo
          SOURCE_TRACK: internal
          TARGET_TRACK: ${{ matrix.track }}
          VERSION_CODE: ${{ needs.build.outputs.version_code }}
          VERSION_NAME: ${{ needs.build.outputs.version_name }}
        run: |
          python3 -m venv /tmp/promote-venv
          # Pinned exact versions — this job runs with PLAY_STORE_SERVICE_ACCOUNT_JSON
          # in env, so a compromised PyPI release must not be pullable here (#1230).
          # Deps live in a requirements file so Dependabot can track/bump them (#1286).
          /tmp/promote-venv/bin/pip install --quiet -r .github/workflows/requirements/play-store.txt

          /tmp/promote-venv/bin/python3 << 'PYEOF'
          import json, os, sys, requests
          from google.oauth2 import service_account
          from google.auth.transport.requests import AuthorizedSession

          PACKAGE = os.environ["PACKAGE_NAME"]
          SOURCE  = os.environ["SOURCE_TRACK"]
          TARGET  = os.environ["TARGET_TRACK"]
          CODE    = int(os.environ["VERSION_CODE"])
          NAME    = os.environ["VERSION_NAME"]

          creds = service_account.Credentials.from_service_account_info(
              json.loads(os.environ["SERVICE_ACCOUNT_JSON"]),
              scopes=["https://www.googleapis.com/auth/androidpublisher"],
          )
          sess = AuthorizedSession(creds)
          BASE = f"https://androidpublisher.googleapis.com/androidpublisher/v3/applications/{PACKAGE}"

          # 1. Create an edit.
          r = sess.post(f"{BASE}/edits", json={})
          r.raise_for_status()
          edit_id = r.json()["id"]
          print(f"[promote] edit_id={edit_id}")

          try:
              # 2. Read the source track to confirm the versionCode is there.
              r = sess.get(f"{BASE}/edits/{edit_id}/tracks/{SOURCE}")
              r.raise_for_status()
              source_track = r.json()
              releases = source_track.get("releases", [])
              hit = next(
                  (rel for rel in releases
                   if str(CODE) in [str(c) for c in rel.get("versionCodes", [])]),
                  None,
              )
              if not hit:
                  print(f"[promote] versionCode {CODE} not found on {SOURCE} track — found:")
                  for rel in releases:
                      print(f"  - codes={rel.get('versionCodes')} status={rel.get('status')}")
                  sys.exit(1)
              print(f"[promote] source release codes={hit.get('versionCodes')} status={hit.get('status')} name={hit.get('name')}")

              # 3. PATCH the target track with the same release reference. This
              #    is the promotion — no new AAB upload, just a track-membership
              #    change for the existing versionCode.
              promoted = {
                  "name": hit.get("name") or NAME,
                  "versionCodes": [str(CODE)],
                  "status": "completed",
                  "releaseNotes": hit.get("releaseNotes", []),
              }
              # The target track name is in the URL path; including it
              # in the body too is redundant but accepted by the API.
              # Dropping it keeps the request minimal.
              r = sess.put(
                  f"{BASE}/edits/{edit_id}/tracks/{TARGET}",
                  json={"releases": [promoted]},
              )
              r.raise_for_status()
              print(f"[promote] target track {TARGET} now carries versionCode {CODE}")

              # 4. Commit the edit.
              r = sess.post(f"{BASE}/edits/{edit_id}:commit")
              r.raise_for_status()
              print(f"[promote] commit OK — {SOURCE}@{CODE} → {TARGET}")
          except Exception:
              # Best-effort rollback so a failed promote doesn't leave a dangling
              # edit. Errors during cleanup are non-fatal.
              try:
                  sess.delete(f"{BASE}/edits/{edit_id}")
              except Exception:
                  pass
              raise
          PYEOF

  # ── Sync app-listing text (title / shortDescription / fullDescription).
  #
  # Apple-side equivalent lives in app-store.yml. Trigger logic mirrors it:
  # ONLY on tag pushes matching `vX.Y.0` (major / minor releases) — patch
  # releases (`vX.Y.1+`) leave the listing untouched. Rationale:
  #
  #   - Listing text rarely changes between patches; pushing identical
  #     copy on every `vX.Y.1` would clutter the Play Console's "Recent
  #     changes" tab with no signal.
  #   - The `whatsnew-en-US` payload (set above by the publish job)
  #     remains the per-release surface for "what changed".
  #
  # Runs as a separate job (not a publish-matrix step) so it fires
  # exactly once regardless of how many tracks the publish covered.
  # Uses its own Edit — independent of the upload + promote Edits — so
  # a listing-sync failure cannot block the AAB rollout.
  sync-listing:
    name: Sync Play Store listing (en-US)
    needs: [build, publish]
    runs-on: ubuntu-latest
    timeout-minutes: 10
    # Best-effort: the listing-text sync is NOT a release gate. The AAB
    # rollout (build + publish) is the release; this job only refreshes the
    # store-listing copy. `continue-on-error: true` means a failure here
    # (notably a 403 Forbidden on `edits:commit` when the deploy service
    # account lacks the Play Console 'Edit store listing' permission —
    # tracked in #1386) is TOLERATED and must never mark a green deploy red.
    # The real fix is granting that permission in the Play Console, which is
    # a separate manual maintainer task.
    continue-on-error: true
    # Match `vX.Y.0` exactly — drops `4.0.0-rc.1` (pre-release), `4.3.1`
    # (patch), AND `4.3.10` (would slip past a naive `endsWith('.0')`
    # check). The gate is computed via bash regex on `VERSION_NAME` in
    # the build job's `is_minor_bump` output.
    if: needs.build.outputs.is_minor_bump == 'true'
    steps:
      - name: Checkout (for distribution/play-store/* files)
        uses: actions/checkout@v6

      - name: Push listing to Play Console
        env:
          SERVICE_ACCOUNT_JSON: ${{ secrets.PLAY_STORE_SERVICE_ACCOUNT_JSON }}
          PACKAGE_NAME: io.github.sceneview.demo
          LISTING_DIR: samples/android-demo/distribution/play-store
        run: |
          python3 -m venv /tmp/listing-venv
          # Pinned exact versions — credential-bearing job (#1230).
          # Deps live in a requirements file so Dependabot can track/bump them (#1286).
          /tmp/listing-venv/bin/pip install --quiet -r .github/workflows/requirements/play-store.txt

          /tmp/listing-venv/bin/python3 << 'PYEOF'
          import json, os, sys, pathlib, requests
          from google.oauth2 import service_account
          from google.auth.transport.requests import AuthorizedSession

          PKG = os.environ["PACKAGE_NAME"]
          ROOT = pathlib.Path(os.environ["LISTING_DIR"])
          creds = service_account.Credentials.from_service_account_info(
              json.loads(os.environ["SERVICE_ACCOUNT_JSON"]),
              scopes=["https://www.googleapis.com/auth/androidpublisher"],
          )
          sess = AuthorizedSession(creds)
          BASE = f"https://androidpublisher.googleapis.com/androidpublisher/v3/applications/{PKG}"

          # Per-locale field caps enforced by Google Play. Truncate with `…`
          # if a file exceeds the cap (a `printf` in a localized terminal
          # may have inserted hard line breaks that pad the byte count).
          CAPS = {"title": 30, "shortDescription": 80, "fullDescription": 4000}
          FILE_MAP = {
              "title": "title.txt",
              "shortDescription": "short_description.txt",
              "fullDescription": "full_description.txt",
          }

          locales = [d.name for d in ROOT.iterdir() if d.is_dir()]
          if not locales:
              print(f"::warning::No locale subdirectories under {ROOT} — nothing to sync")
              sys.exit(0)

          # 1. Open a new Edit (independent of any other edits already
          #    committed by the publish or promote steps).
          r = sess.post(f"{BASE}/edits")
          r.raise_for_status()
          edit_id = r.json()["id"]
          print(f"[listing] edit_id={edit_id}")

          try:
              for locale in locales:
                  ldir = ROOT / locale
                  body = {}
                  for field, fname in FILE_MAP.items():
                      f = ldir / fname
                      if not f.exists():
                          print(f"[listing] {locale}: skip {field} ({fname} missing)")
                          continue
                      text = f.read_text().strip()
                      cap = CAPS[field]
                      if len(text) > cap:
                          text = text[: cap - 1].rstrip() + "…"
                          print(f"::warning::{locale}/{fname} exceeded {cap} chars — truncated")
                      body[field] = text

                  if not body:
                      print(f"[listing] {locale}: empty payload, skipping")
                      continue

                  r = sess.put(
                      f"{BASE}/edits/{edit_id}/listings/{locale}",
                      json=body,
                  )
                  r.raise_for_status()
                  fields = ", ".join(f"{k}={len(v)}c" for k, v in body.items())
                  print(f"[listing] {locale}: {fields}")

              # 2. Commit the edit.
              r = sess.post(f"{BASE}/edits/{edit_id}:commit")
              r.raise_for_status()
              print(f"[listing] commit OK")
          except requests.HTTPError as e:
              # Best-effort rollback — abandon the edit so we don't leave a
              # dangling Edit ID in Play Console.
              try:
                  sess.delete(f"{BASE}/edits/{edit_id}")
              except Exception:
                  pass
              status = e.response.status_code if e.response is not None else None
              if status == 403:
                  # The deploy service account lacks the Play Console
                  # 'Edit store listing' permission (#1386). The app deploy
                  # already succeeded — a listing-sync 403 is best-effort and
                  # must not fail the release. Warn and exit cleanly; the
                  # job is also `continue-on-error: true` as a safety net.
                  print(
                      "::warning::Play Store listing sync got 403 Forbidden — "
                      "the deploy service account lacks the 'Edit store "
                      "listing' permission. Listing copy NOT updated; the app "
                      "deploy is unaffected. Grant the permission in the Play "
                      "Console to enable listing sync (see #1386)."
                  )
                  sys.exit(0)
              raise
          except Exception:
              try:
                  sess.delete(f"{BASE}/edits/{edit_id}")
              except Exception:
                  pass
              raise
          PYEOF
