name: CI

# Single consolidated PR + push workflow (#1370).
#
# WHY THIS EXISTS
# ---------------
# Until 2026-05-15 every PR fired THREE separate workflows — `ci.yml` (CI),
# `pr-check.yml` (PR Check) and `quality-gate.yml` (quality-gate) — plus the
# `CI Gate` aggregator. `ci.yml` and `pr-check.yml` EACH carried their own
# `changes` "Detect changed paths" job, so `dorny/paths-filter` ran twice per
# PR, and all three workflows paid checkout + JDK + Gradle-cache-restore
# independently. #1370 consolidated the three into this one workflow with a
# SINGLE `changes` path-detection job whose outputs gate every downstream job.
#
# Jobs:
#   - changes        path detection (one dorny/paths-filter run for the whole PR)
#   - build          libraries + sample APKs        (gated on `android`)
#   - lint           Android lint                   (gated on `android`)
#   - unit-test      JVM unit tests + JaCoCo        (gated on `android`)
#   - web-desktop    Kotlin/JS + Compose Desktop     (gated on `web`)
#   - flutter-demo   flutter-demo APK               (gated on `flutter`)
#   - compile-kmp    iOS Kotlin/Native targets       (gated on `kmp`)
#   - repo-hygiene   grep/validate micro-gates       (always, when workflow runs)
#   - quality-gate   full .claude/scripts/quality-gate.sh (gated on `quality_gate`)
#
# The `CI Gate` aggregator (ci-gate.yml) polls the Checks API for the PR head
# SHA and treats `skipped` as passing, so it needs NO `needs:` edit when jobs
# are added/removed here — a path-gated-out job simply reports `skipped`.

on:
  push:
    branches: [main]
    # NOTE: intentionally a NARROW ignore list — only paths that no job here
    # exercises. `mcp*/**`, `tools/**` and `.claude/**` are NOT ignored:
    # `quality-gate` runs MCP unit tests and validates `.claude/scripts`, so
    # the per-job `changes` filter (not a workflow-level ignore) decides
    # whether each job runs for those paths.
    paths-ignore:
      - 'website-static/**'
      - 'docs/**'
      - 'marketing/**'
      - 'branding/**'
      - '*.md'
      - 'llms*.txt'
      - 'LICENSE'
  pull_request:
    branches: [main]
    paths-ignore:
      - 'website-static/**'
      - 'docs/**'
      - 'marketing/**'
      - 'branding/**'
      - '*.md'
      - 'llms*.txt'
      - 'LICENSE'
  workflow_dispatch:
  # Allows nightly-ci.yml to invoke this workflow as a reusable workflow so
  # the scheduled full-validation run reuses these job definitions instead
  # of copy-pasting them. See #1324.
  workflow_call:
    inputs:
      force-all:
        description: >-
          Run every job regardless of the path filter. The nightly
          full-CI safety-net sets this so a path-gated-out regression still
          gets compiled/tested/built within 24h.
        type: boolean
        default: false

# Cancel in-progress runs for the same branch/PR to save resources
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  # ── Path-filter gate ─────────────────────────────────────────────────────
  # Single path-detection job for the whole PR. Computes which areas of the
  # repo a PR touched so the build jobs below can each skip when nothing in
  # their scope changed. The workflow-level `paths-ignore` above already
  # drops pure docs/website PRs; this finer per-job gate stops, for example,
  # a Flutter-only change from rebuilding the Android libraries or a web-only
  # change from rebuilding the Flutter demo. See #1295 / #1370.
  #
  # A job that gets `if:`-skipped reports the "skipped" conclusion, which
  # GitHub treats as success for branch-protection required checks — the
  # same guarantee the repo already relies on for the workflow-level `paths`
  # filters in ios.yml / build-apks.yml / telemetry-ci.yml. No check is
  # renamed, so branch protection (which requires only `CI Gate`) is
  # unaffected.
  changes:
    name: Detect changed paths
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      android: ${{ steps.filter.outputs.android }}
      web: ${{ steps.filter.outputs.web }}
      flutter: ${{ steps.filter.outputs.flutter }}
      kmp: ${{ steps.filter.outputs.kmp }}
    steps:
      - uses: actions/checkout@v6
      - uses: dorny/paths-filter@v4
        id: filter
        with:
          # Conservative bias (#1295): when unsure whether a path is in
          # scope, INCLUDE it — a needless rebuild is cheaper than a
          # skipped-but-needed test. `sceneview-core/**` is shared KMP
          # logic, so it intentionally appears in `android`, `web` and
          # `kmp`. This workflow file is listed under every filter so a CI
          # change always re-runs every job. `push` events (branch `main`)
          # have no PR diff base — the action falls back to comparing
          # against the previous commit; the workflow-level `paths-ignore`
          # is the real gate there.
          filters: |
            shared: &shared
              - '.github/workflows/ci.yml'
              - '.github/actions/setup-gradle/**'
              - 'gradle/**'
              - 'build.gradle*'
              - 'settings.gradle*'
              - 'gradle.properties'
              - 'gradlew'
              - 'gradlew.bat'
            android:
              - *shared
              - 'sceneview/**'
              - 'arsceneview/**'
              - 'sceneview-core/**'
              - 'samples/android-demo/**'
              - 'samples/android-tv-demo/**'
              - 'samples/common/**'
            web:
              - *shared
              - 'sceneview-core/**'
              - 'sceneview-web/**'
              - 'samples/web-demo/**'
            flutter:
              - *shared
              - 'flutter/**'
              - 'samples/flutter-demo/**'
            # `kmp` covers everything that affects the iOS Kotlin/Native
            # compilation of sceneview-core: the KMP module itself, the
            # Android consumers that share its source set, and sceneview-web.
            kmp:
              - *shared
              - 'sceneview-core/**'
              - 'arsceneview/**'
              - 'sceneview/**'
              - 'sceneview-web/**'

  # ── Android build / test / lint ──────────────────────────────────────────
  # Gap #6 (#1311): the former single "Build & lint" job ran assembleDebug +
  # 2 demo APKs + JaCoCo unit tests + lint sequentially (~8.5 min long pole).
  # It is now split into three jobs that run in parallel on separate runners
  # and share the same Gradle build cache (the `setup-gradle` composite action
  # is `cache-read-only` on non-push, so the cache is consistent across them).
  # Trades a few extra runner-minutes for ~3 min wall-clock. All three are
  # picked up automatically by the `CI Gate` aggregator (#1314), which polls
  # every check run for the head SHA rather than using a static `needs:` list.
  build:
    name: Build libraries & samples
    needs: changes
    if: inputs.force-all || needs.changes.outputs.android == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v6

      - uses: ./.github/actions/setup-gradle

      - name: Build libraries + samples
        env:
          # Optional. Unset on forks → demo gracefully disables Geospatial/Streetscape.
          ARCORE_API_KEY: ${{ secrets.ARCORE_API_KEY }}
        run: |
          ./gradlew \
            assembleDebug \
            :samples:android-demo:assembleDebug \
            :samples:android-tv-demo:assembleDebug \
            --stacktrace

  lint:
    name: Lint
    needs: changes
    if: inputs.force-all || needs.changes.outputs.android == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v6

      - uses: ./.github/actions/setup-gradle

      - name: Lint
        run: ./gradlew :sceneview:lintDebug :arsceneview:lintDebug --stacktrace

      - name: Upload lint reports
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: lint-reports
          path: |
            sceneview/build/reports/lint-results-debug.html
            arsceneview/build/reports/lint-results-debug.html
          if-no-files-found: ignore

  unit-test:
    name: Unit tests + coverage
    needs: changes
    if: inputs.force-all || needs.changes.outputs.android == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v6

      - uses: ./.github/actions/setup-gradle

      - name: Unit tests + JaCoCo coverage
        # Single invocation: jacocoTestReport depends on testDebugUnitTest so
        # Gradle runs the tests, drops the exec file under
        # `outputs/unit_test_code_coverage/`, then generates XML + HTML
        # reports. Replaces the previous `testDebugUnitTest`-only call so
        # we don't run the test suite twice. See #964.
        #
        # `:samples:android-demo:testDebugUnitTest` runs
        # `ARBundledRecordingsTest` (the bundled-recording ftyp/avc1/mett
        # contract suite from #1060/#1100). Not under JaCoCo because the
        # samples module has no coverage gate. See #1130.
        #
        # `:samples:common:testDebugUnitTest` runs the shared-helper
        # regression suite — LifecycleAwareLaunchedEffect, LifecyclePauseGate,
        # rememberMaterialInstance, InAppUpdateManager. See #972.
        run: |
          ./gradlew \
            :sceneview:jacocoTestReport \
            :arsceneview:jacocoTestReport \
            :samples:common:testDebugUnitTest \
            :samples:android-demo:testDebugUnitTest \
            --stacktrace

      - name: Coverage summary
        if: always()
        # One-line headline per module (line coverage). Doesn't fail the
        # build on low coverage — establishing a baseline is a follow-up.
        run: |
          python3 - <<'PY'
          import os, sys, xml.etree.ElementTree as ET
          rows = []
          for mod in ("sceneview", "arsceneview"):
              path = f"{mod}/build/reports/jacoco/jacocoTestReport/jacocoTestReport.xml"
              if not os.path.exists(path):
                  rows.append(f"{mod}: NO REPORT (jacocoTestReport failed?)")
                  continue
              root = ET.parse(path).getroot()
              for c in root.findall("counter"):
                  if c.get("type") == "LINE":
                      covered = int(c.get("covered"))
                      missed = int(c.get("missed"))
                      total = covered + missed
                      pct = 100 * covered / total if total else 0
                      rows.append(f"{mod}: {pct:.1f}% line ({covered}/{total})")
                      break
          print("## JaCoCo coverage")
          for r in rows:
              print(f"- {r}")
          # Also write a step summary so the CI run page surfaces it.
          summary = os.environ.get("GITHUB_STEP_SUMMARY")
          if summary:
              with open(summary, "a") as f:
                  f.write("## JaCoCo coverage\n")
                  for r in rows:
                      f.write(f"- {r}\n")
          PY

      - name: Coverage delta gate
        if: always()
        # Compares this PR's line coverage against the committed baseline in
        # `.claude/data/jacoco-baseline.txt` and reports whether any module
        # dropped more than `threshold_pp` (0.5pp default). See #973.
        #
        # `continue-on-error: true` keeps it INFORMATIONAL for now — a real
        # regression is logged loudly and surfaced in the job step summary,
        # but the step failure does not flip the `unit-test` job (and
        # therefore the `CI Gate` aggregator) red. Promote it to a hard gate
        # by deleting this `continue-on-error` line once it has been green
        # for two consecutive weeks (the #973 follow-up ratchet step).
        continue-on-error: true
        run: |
          set +e
          bash .claude/scripts/jacoco-delta-check.sh 2>&1 | tee /tmp/jacoco-delta.log
          status=${PIPESTATUS[0]}
          {
            echo "## JaCoCo coverage delta gate"
            echo ""
            echo '```'
            sed 's/\x1b\[[0-9;]*m//g' /tmp/jacoco-delta.log
            echo '```'
            if [ "$status" -ne 0 ]; then
              echo ""
              echo "> :warning: Coverage regressed beyond the allowed threshold."
              echo "> This check is currently **informational** (non-blocking)."
            fi
          } >> "$GITHUB_STEP_SUMMARY"
          exit "$status"

      - name: Upload coverage reports
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: jacoco-coverage
          path: |
            sceneview/build/reports/jacoco/jacocoTestReport/
            arsceneview/build/reports/jacoco/jacocoTestReport/
          if-no-files-found: warn

  # ── Web & Desktop modules (Kotlin/JS + Compose Desktop) ──────────────────
  # Job id kept as `web-desktop` for check-run history continuity; it now
  # builds the web targets only (the desktop-demo placeholder step was
  # dropped in #1396).
  web-desktop:
    name: Build web targets
    needs: changes
    if: inputs.force-all || needs.changes.outputs.web == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - uses: actions/checkout@v6

      - uses: ./.github/actions/setup-gradle

      - uses: actions/setup-node@v6
        with:
          node-version: 20

      - name: Build web targets
        run: |
          ./gradlew \
            :sceneview-core:jsMainClasses \
            :sceneview-web:jsMainClasses \
            :samples:web-demo:compileKotlinJs \
            --stacktrace

      # Full production webpack bundle. Goes beyond `compileKotlinJs` because
      # it runs the real webpack 5 pipeline against filament.js, which
      # imports Node core modules (path, fs, crypto) unconditionally and
      # fails hard without samples/web-demo/webpack.config.d/filament.js.
      # Keeps session 34's polyfill fix protected on every main push.
      - name: web-demo production webpack
        run: ./gradlew :samples:web-demo:jsBrowserProductionWebpack --stacktrace

      # samples/desktop-demo is a deliberate Compose Canvas wireframe
      # placeholder (Filament JNI is not available on desktop) — it does not
      # use SceneView or Filament. A compile check that can never fail
      # (`continue-on-error: true`) only burned runner minutes, so it was
      # dropped per the drop-or-make-blocking decision in #1396.

      - name: JS tests (informational)
        continue-on-error: true
        run: ./gradlew :sceneview-core:jsTest --stacktrace

  # ── Flutter demo build ──────────────────────────────────────────────────
  # Protects the Kotlin 2.0 Compose Compiler plugin wiring in
  # flutter/sceneview_flutter/android/build.gradle. Without this job, a
  # direct push to main that removes the plugin (or downgrades Kotlin)
  # only shows up the next time someone runs `flutter build apk`.
  flutter-demo:
    name: Build flutter-demo APK
    needs: changes
    if: inputs.force-all || needs.changes.outputs.flutter == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - uses: actions/checkout@v6

      - uses: ./.github/actions/setup-gradle
        with:
          # Flutter's Android build still uses AGP 7.x-era toolchain
          # constraints — needs JDK 17 not 21.
          java-version: "17"

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.41.6"
          channel: stable
          cache: true

      - name: flutter pub get
        working-directory: samples/flutter-demo
        run: flutter pub get

      - name: flutter analyze
        working-directory: samples/flutter-demo
        run: flutter analyze --no-fatal-infos --no-fatal-warnings

      - name: flutter build apk --debug
        working-directory: samples/flutter-demo
        run: flutter build apk --debug

  # ── KMP core (iOS-only native targets) ──────────────────────────────────
  # `web-desktop` already compiles the JS KMP targets and `build` consumes
  # the JVM/Android target via `assembleDebug`. The ONLY KMP targets nothing
  # else exercises on PR are the iOS Kotlin/Native ones (`ios.yml` builds the
  # Swift package, not the KMP native targets), so this job is narrowed to
  # them — the unique PR-time guard on Kotlin/Native compilation. Closes
  # #1311 gaps #3 + #4. Formerly `pr-check.yml:compile-kmp` (#1370).
  compile-kmp:
    name: Compile KMP core
    needs: changes
    if: inputs.force-all || needs.changes.outputs.kmp == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v6

      - uses: ./.github/actions/setup-gradle

      - name: Compile KMP core (iOS Kotlin/Native targets)
        run: |
          ./gradlew \
            :sceneview-core:compileKotlinIosArm64 \
            :sceneview-core:compileKotlinIosSimulatorArm64 \
            :sceneview-core:compileKotlinIosX64 \
            --stacktrace

  # ── Repo hygiene checks ─────────────────────────────────────────────────
  # One job consolidating the 5 micro grep/validate gates that used to each
  # surface as their own top-level status check (see #1305). Each gate runs
  # as a sequential step; `if: always()` on the later steps means a PR
  # author sees EVERY violation in a single run instead of fixing them one
  # check at a time. The job still fails red if any gate fails because each
  # step's non-zero exit propagates to the job result.
  #
  # Not path-gated: these are sub-second greps that validate cross-cutting
  # invariants (deprecated API names, agent-skill drift, dead SPM URLs,
  # workflow shell blocks, demo asset refs). Running them on every CI
  # invocation is cheap insurance. Formerly `pr-check.yml:repo-hygiene`.
  #
  # Don't write deprecated composable names verbatim in these comments —
  # check-deprecated-api.sh greps source files and would flag the comment
  # itself, as it did on commit ae433620.
  repo-hygiene:
    name: Repo hygiene checks
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6

      # Deprecated API regression detector — sub-second guard against AI
      # sessions reintroducing the pre-v3.6 composable names (renamed in
      # commit e6a26a06).
      - name: Check for deprecated SceneView API refs
        shell: bash
        run: bash .claude/scripts/check-deprecated-api.sh --all

      # SceneView agent skill drift detector — catches hallucinated APIs in
      # agents/sceneview/ (e.g. `rememberARSession` or `AnchorNode.image()`)
      # BEFORE merge — see PR #1072 for the kind of drift this prevents.
      - name: Check SceneView agent skill is in sync with source
        if: always()
        shell: bash
        run: bash .claude/scripts/check-sceneview-skill.sh

      # Archived SPM mirror URL guard — the `sceneview/sceneview-swift` SPM
      # mirror was archived in PR #1215; SceneViewSwift now resolves from the
      # monorepo root Package.swift. Any NEW reference to the dead mirror URL
      # points users at a dead resolution path. Closes #1237.
      - name: Forbid archived sceneview-swift mirror URLs
        if: always()
        shell: bash
        run: bash .claude/scripts/check-sceneview-swift-urls.sh

      # Workflow shell-block validation — pre-validates `script:` blocks in
      # every .github/workflows/*.yml against `dash` so we catch bashisms
      # before they ship to CI. Closes #1114.
      - name: Install dash + shellcheck
        if: always()
        shell: bash
        run: |
          # Both ship in ubuntu-latest, but pin explicitly so the job is
          # self-contained on any runner image refresh.
          if ! command -v dash >/dev/null 2>&1; then
            sudo apt-get update -qq
            sudo apt-get install -y -qq dash
          fi
          if ! command -v shellcheck >/dev/null 2>&1; then
            sudo apt-get update -qq
            sudo apt-get install -y -qq shellcheck
          fi
          # PyYAML — already in the runner image, but assert.
          # Fallback deps live in a requirements file so Dependabot tracks them (#1286).
          python3 -c "import yaml" || pip install --quiet -r .github/workflows/requirements/ci.txt

      - name: Validate workflow shell blocks (dash + shellcheck)
        if: always()
        shell: bash
        run: bash .claude/scripts/check-workflow-scripts.sh

      # Demo app asset integrity — catches broken model/HDR references in
      # any samples/* demo app, both for bundled file paths and CDN URLs.
      # Self-test first so a regressed validator can't report a false PASS.
      - name: Self-test validate-demo-assets.sh
        if: always()
        shell: bash
        run: bash .claude/scripts/test-validate-demo-assets.sh

      - name: Validate demo app asset references
        if: always()
        shell: bash
        run: bash .claude/scripts/validate-demo-assets.sh

  # ── Full quality gate ────────────────────────────────────────────────────
  # Runs the same .claude/scripts/quality-gate.sh that contributors run
  # locally before pushing. Includes:
  #   - Version sync across all modules
  #   - Security checks (no secrets, no tracked local.properties)
  #   - Deprecated SceneView API detector
  #   - Demo app asset integrity (bundled refs + CDN URLs)
  #   - MCP unit tests
  #   - Website asset rules (no Google Fonts, Three.js, model-viewer, CDNs)
  # The Android assembleDebug + unit tests are skipped here
  # (QUALITY_GATE_SKIP_ANDROID=1) because the `build` / `unit-test` jobs
  # above already run them in parallel. Formerly `quality-gate.yml` (#1370).
  #
  # Not path-gated: the former quality-gate.yml had only a workflow-level
  # `paths-ignore` (no per-job filter), so it ran on every non-docs PR.
  # The workflow-level `paths-ignore` above already drops docs PRs, so this
  # job runs whenever the workflow runs — same scope as before. The `push`
  # trigger preserves the `Quality gate (full)` check on `main` pushes.
  quality-gate:
    name: Quality gate (full)
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        # Gap #10 (#1311): the default shallow checkout (fetch-depth: 1) is
        # sufficient. quality-gate.sh only runs `git diff HEAD`,
        # `git diff --cached`, `git ls-files` and `git branch --show-current`
        # — all of which resolve against the working tree / HEAD, never an
        # older commit. sync-versions.sh compares files with plain `diff`, no
        # git history.
        uses: actions/checkout@v6

      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 21

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v6
        with:
          # PRs read the cache (no writes from forks). Pushes to main repopulate it.
          cache-read-only: ${{ github.event_name != 'push' }}

      - uses: ./.github/actions/setup-mcp

      - name: Set up Android SDK
        uses: android-actions/setup-android@v4

      - name: Write local.properties
        # quality-gate.sh invokes ./gradlew, which needs sdk.dir on Linux runners.
        run: echo "sdk.dir=$ANDROID_HOME" > local.properties

      - name: Make gradlew executable
        run: chmod +x ./gradlew

      - name: Run quality gate
        shell: bash
        env:
          # Optional. Demo runtime disables Geospatial when unset.
          ARCORE_API_KEY: ${{ secrets.ARCORE_API_KEY }}
          # The `build` / `unit-test` jobs already run `assembleDebug` + the
          # same unit-test set + JaCoCo coverage in parallel with this gate.
          # Skipping the duplicate Android build/test work here keeps the gate
          # focused on what it owns uniquely: version sync, security scans,
          # asset CDN integrity, website rules, MCP tests, agent skill drift.
          QUALITY_GATE_SKIP_ANDROID: "1"
        run: bash .claude/scripts/quality-gate.sh

      - name: Upload validate-demo-assets log
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: validate-demo-assets-log
          path: /tmp/validate-demo-assets.log
          if-no-files-found: ignore
          retention-days: 7

      - name: Upload check-deprecated-api log
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: check-deprecated-api-log
          path: /tmp/check-deprecated-api.log
          if-no-files-found: ignore
          retention-days: 7

      - name: Upload check-sceneview-skill log
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: check-sceneview-skill-log
          path: /tmp/check-sceneview-skill.log
          if-no-files-found: ignore
          retention-days: 7
