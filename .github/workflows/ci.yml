name: CI

on:
  push:
    branches: [main]
    paths-ignore:
      - 'website-static/**'
      - 'docs/**'
      - 'marketing/**'
      - 'mcp*/**'
      - '*.md'
      - 'llms*.txt'
      - 'LICENSE'
  pull_request:
    branches: [main]
    paths-ignore:
      - 'website-static/**'
      - 'docs/**'
      - 'marketing/**'
      - 'mcp*/**'
      - '*.md'
      - 'llms*.txt'
      - 'LICENSE'
  workflow_dispatch:

# Cancel in-progress runs for the same branch/PR to save resources
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  build:
    name: Build & lint
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v6

      - uses: ./.github/actions/setup-gradle

      - name: Build libraries + samples
        env:
          # Optional. Unset on forks → demo gracefully disables Geospatial/Streetscape.
          ARCORE_API_KEY: ${{ secrets.ARCORE_API_KEY }}
        run: |
          ./gradlew \
            assembleDebug \
            :samples:android-demo:assembleDebug \
            :samples:android-tv-demo:assembleDebug \
            --stacktrace

      - name: Unit tests + JaCoCo coverage
        # Single invocation: jacocoTestReport depends on testDebugUnitTest so
        # Gradle runs the tests, drops the exec file under
        # `outputs/unit_test_code_coverage/`, then generates XML + HTML
        # reports. Replaces the previous `testDebugUnitTest`-only call so
        # we don't run the test suite twice. See #964.
        #
        # `:samples:android-demo:testDebugUnitTest` runs
        # `ARBundledRecordingsTest` (the bundled-recording ftyp/avc1/mett
        # contract suite from #1060/#1100). Not under JaCoCo because the
        # samples module has no coverage gate. See #1130.
        run: |
          ./gradlew \
            :sceneview:jacocoTestReport \
            :arsceneview:jacocoTestReport \
            :samples:android-demo:testDebugUnitTest \
            --stacktrace

      - name: Coverage summary
        if: always()
        # One-line headline per module (line coverage). Doesn't fail the
        # build on low coverage — establishing a baseline is a follow-up.
        run: |
          python3 - <<'PY'
          import os, sys, xml.etree.ElementTree as ET
          rows = []
          for mod in ("sceneview", "arsceneview"):
              path = f"{mod}/build/reports/jacoco/jacocoTestReport/jacocoTestReport.xml"
              if not os.path.exists(path):
                  rows.append(f"{mod}: NO REPORT (jacocoTestReport failed?)")
                  continue
              root = ET.parse(path).getroot()
              for c in root.findall("counter"):
                  if c.get("type") == "LINE":
                      covered = int(c.get("covered"))
                      missed = int(c.get("missed"))
                      total = covered + missed
                      pct = 100 * covered / total if total else 0
                      rows.append(f"{mod}: {pct:.1f}% line ({covered}/{total})")
                      break
          print("## JaCoCo coverage")
          for r in rows:
              print(f"- {r}")
          # Also write a step summary so the CI run page surfaces it.
          summary = os.environ.get("GITHUB_STEP_SUMMARY")
          if summary:
              with open(summary, "a") as f:
                  f.write("## JaCoCo coverage\n")
                  for r in rows:
                      f.write(f"- {r}\n")
          PY

      - name: Upload coverage reports
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: jacoco-coverage
          path: |
            sceneview/build/reports/jacoco/jacocoTestReport/
            arsceneview/build/reports/jacoco/jacocoTestReport/
          if-no-files-found: warn

      - name: Lint
        run: ./gradlew :sceneview:lintDebug :arsceneview:lintDebug --stacktrace

      - name: Upload lint reports
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: lint-reports
          path: |
            sceneview/build/reports/lint-results-debug.html
            arsceneview/build/reports/lint-results-debug.html
          if-no-files-found: ignore

  # ── Web & Desktop modules (Kotlin/JS + Compose Desktop) ──────────────────
  web-desktop:
    name: Build web & desktop
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - uses: actions/checkout@v6

      - uses: ./.github/actions/setup-gradle

      - uses: actions/setup-node@v6
        with:
          node-version: 20

      - name: Build web targets
        run: |
          ./gradlew \
            :sceneview-core:jsMainClasses \
            :sceneview-web:jsMainClasses \
            :samples:web-demo:compileKotlinJs \
            --stacktrace

      # Full production webpack bundle. Goes beyond `compileKotlinJs` because
      # it runs the real webpack 5 pipeline against filament.js, which
      # imports Node core modules (path, fs, crypto) unconditionally and
      # fails hard without samples/web-demo/webpack.config.d/filament.js.
      # Keeps session 34's polyfill fix protected on every main push.
      - name: web-demo production webpack
        run: ./gradlew :samples:web-demo:jsBrowserProductionWebpack --stacktrace

      - name: Build desktop targets
        # continue-on-error: desktop is a Compose Canvas placeholder, not a real Filament target
        continue-on-error: true
        run: ./gradlew :samples:desktop-demo:compileKotlinDesktop --stacktrace

      - name: JS tests (informational)
        continue-on-error: true
        run: ./gradlew :sceneview-core:jsTest --stacktrace

  # ── Flutter demo build ──────────────────────────────────────────────────
  # Protects the Kotlin 2.0 Compose Compiler plugin wiring in
  # flutter/sceneview_flutter/android/build.gradle. Without this job, a
  # direct push to main that removes the plugin (or downgrades Kotlin)
  # only shows up the next time someone runs `flutter build apk`.
  flutter-demo:
    name: Build flutter-demo APK
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - uses: actions/checkout@v6

      - uses: ./.github/actions/setup-gradle
        with:
          # Flutter's Android build still uses AGP 7.x-era toolchain
          # constraints — needs JDK 17 not 21.
          java-version: "17"

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.41.6"
          channel: stable
          cache: true

      - name: flutter pub get
        working-directory: samples/flutter-demo
        run: flutter pub get

      - name: flutter analyze
        working-directory: samples/flutter-demo
        run: flutter analyze --no-fatal-infos --no-fatal-warnings

      - name: flutter build apk --debug
        working-directory: samples/flutter-demo
        run: flutter build apk --debug
