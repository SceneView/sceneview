name: Submit iOS build for App Store review

# One-shot workflow: take the latest valid TestFlight build of
# io.github.sceneview.demo, attach it to App Store Version 4.0.3,
# fill in "What's New" localization, and submit for App Store
# review via App Store Connect API. Delete this file once Apple
# has reviewed and released the version.
#
# Why a separate workflow: triggering app-store.yml with
# submit_for_review=true would re-run archive+export, and the
# duplicate upload of the same version/build is rejected by ASC
# with a 409. This workflow skips the build pipeline entirely.

on:
  workflow_dispatch:
    inputs:
      version_string:
        description: "Marketing version to submit (must match the uploaded build)"
        required: true
        default: "4.0.3"
      whats_new:
        description: "Release notes / What's New text shown on the App Store"
        required: true
        default: |
          • Universal Links: scan a QR code on sceneview.github.io and land directly on the matching demo screen.
          • New "Save & Share" flow on AR demos: export a Rerun.io capture you can replay in the browser.
          • Refreshed deep-link experience between the website, README, and the app.

permissions:
  contents: read

concurrency:
  group: submit-ios-for-review
  cancel-in-progress: false

jobs:
  submit:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install --quiet "PyJWT[crypto]" requests

      - name: Submit build for App Store review
        env:
          ASC_KEY_ID: ${{ secrets.APP_STORE_CONNECT_KEY_ID }}
          ASC_ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_ISSUER_ID }}
          ASC_API_KEY: ${{ secrets.APP_STORE_CONNECT_API_KEY }}
          VERSION_STRING: ${{ inputs.version_string }}
          WHATS_NEW: ${{ inputs.whats_new }}
        run: |
          mkdir -p ~/.private_keys
          echo "$ASC_API_KEY" > ~/.private_keys/AuthKey_${ASC_KEY_ID}.p8

          python3 <<'PYEOF'
          import os, time, jwt, requests, sys

          KEY_ID = os.environ["ASC_KEY_ID"]
          ISSUER_ID = os.environ["ASC_ISSUER_ID"]
          BUNDLE_ID = "io.github.sceneview.demo"
          VERSION = os.environ["VERSION_STRING"]
          WHATS_NEW = os.environ["WHATS_NEW"]

          with open(os.path.expanduser(f"~/.private_keys/AuthKey_{KEY_ID}.p8")) as f:
              private_key = f.read()

          def make_token():
              return jwt.encode(
                  {"iss": ISSUER_ID, "iat": int(time.time()), "exp": int(time.time()) + 1200, "aud": "appstoreconnect-v1"},
                  private_key,
                  algorithm="ES256",
                  headers={"kid": KEY_ID},
              )

          def hdr():
              return {"Authorization": f"Bearer {make_token()}", "Content-Type": "application/json"}

          BASE = "https://api.appstoreconnect.apple.com/v1"

          def fail(msg, resp=None):
              print(f"::error::{msg}")
              if resp is not None:
                  print(f"  status={resp.status_code} body={resp.text[:1500]}")
              sys.exit(1)

          # 1. Find the app
          r = requests.get(f"{BASE}/apps", headers=hdr(), params={"filter[bundleId]": BUNDLE_ID})
          if r.status_code != 200 or not r.json()["data"]:
              fail(f"App {BUNDLE_ID} not found", r)
          app_id = r.json()["data"][0]["id"]
          print(f"App id={app_id}")

          # 2. Wait for a VALID build matching the version we want to ship.
          #    Apple processing typically takes 5-15 minutes after upload.
          deadline = time.time() + 25 * 60
          build_id = None
          build_number = None
          while time.time() < deadline:
              r = requests.get(
                  f"{BASE}/builds",
                  headers=hdr(),
                  params={
                      "filter[app]": app_id,
                      "filter[preReleaseVersion.version]": VERSION,
                      "sort": "-uploadedDate",
                      "limit": 5,
                  },
              )
              if r.status_code != 200:
                  fail("Failed to query builds", r)
              builds = r.json()["data"]
              if builds:
                  for b in builds:
                      state = b["attributes"]["processingState"]
                      print(f"  build {b['id']} v{b['attributes']['version']} state={state} expired={b['attributes'].get('expired')}")
                  for b in builds:
                      if b["attributes"]["processingState"] == "VALID" and not b["attributes"].get("expired"):
                          build_id = b["id"]
                          build_number = b["attributes"]["version"]
                          break
              if build_id:
                  break
              print(f"  no VALID build for {VERSION} yet — sleeping 30s")
              time.sleep(30)
          if not build_id:
              fail(f"Timed out waiting for a VALID build of version {VERSION} to appear in App Store Connect")
          print(f"Selected build id={build_id} version={VERSION} ({build_number})")

          # 3. Get or create the App Store Version (state PREPARE_FOR_SUBMISSION)
          r = requests.get(
              f"{BASE}/apps/{app_id}/appStoreVersions",
              headers=hdr(),
              params={"filter[platform]": "IOS", "filter[versionString]": VERSION, "limit": 5, "include": "appStoreVersionLocalizations"},
          )
          if r.status_code != 200:
              fail("Failed to list app store versions", r)
          versions = r.json()["data"]
          if versions:
              version_id = versions[0]["id"]
              state = versions[0]["attributes"]["appStoreState"]
              print(f"Found existing App Store Version id={version_id} state={state}")
              if state in ("READY_FOR_SALE", "REPLACED_WITH_NEW_VERSION", "DEVELOPER_REJECTED", "REJECTED"):
                  fail(f"App Store Version {VERSION} is in unexpected state {state} — can't reuse it. Edit metadata manually on App Store Connect.")
          else:
              payload = {"data": {
                  "type": "appStoreVersions",
                  "attributes": {"platform": "IOS", "versionString": VERSION},
                  "relationships": {"app": {"data": {"type": "apps", "id": app_id}}},
              }}
              r = requests.post(f"{BASE}/appStoreVersions", headers=hdr(), json=payload)
              if r.status_code not in (200, 201):
                  fail("Failed to create App Store Version", r)
              version_id = r.json()["data"]["id"]
              print(f"Created App Store Version id={version_id}")

          # 4. Set "What's New" on the en-US localization (the primary one).
          r = requests.get(
              f"{BASE}/appStoreVersions/{version_id}/appStoreVersionLocalizations",
              headers=hdr(),
              params={"limit": 50},
          )
          if r.status_code != 200:
              fail("Failed to list version localizations", r)
          locs = r.json()["data"]
          en = None
          for loc in locs:
              if loc["attributes"]["locale"] in ("en-US", "en-GB"):
                  en = loc
                  break
          if not en and locs:
              en = locs[0]
          if not en:
              # Create one — this happens when the version is fresh
              payload = {"data": {
                  "type": "appStoreVersionLocalizations",
                  "attributes": {"locale": "en-US", "whatsNew": WHATS_NEW},
                  "relationships": {"appStoreVersion": {"data": {"type": "appStoreVersions", "id": version_id}}},
              }}
              r = requests.post(f"{BASE}/appStoreVersionLocalizations", headers=hdr(), json=payload)
              if r.status_code not in (200, 201):
                  fail("Failed to create en-US localization", r)
              print(f"Created en-US localization for version {version_id}")
          else:
              loc_id = en["id"]
              payload = {"data": {
                  "type": "appStoreVersionLocalizations",
                  "id": loc_id,
                  "attributes": {"whatsNew": WHATS_NEW},
              }}
              r = requests.patch(f"{BASE}/appStoreVersionLocalizations/{loc_id}", headers=hdr(), json=payload)
              if r.status_code not in (200, 201):
                  fail("Failed to set whatsNew", r)
              print(f"Updated whatsNew on locale={en['attributes']['locale']} id={loc_id}")

          # 5. Attach the build to the version
          payload = {"data": {"type": "builds", "id": build_id}}
          r = requests.patch(f"{BASE}/appStoreVersions/{version_id}/relationships/build", headers=hdr(), json=payload)
          if r.status_code not in (200, 204):
              fail("Failed to attach build to version", r)
          print(f"Attached build {build_id} to version {version_id}")

          # 6. Submit for review using the modern reviewSubmissions API.
          #    The legacy /v1/appStoreVersionSubmissions endpoint now only
          #    supports DELETE (to cancel an in-flight submission); CREATE
          #    moved to /v1/reviewSubmissions + /v1/reviewSubmissionItems.

          # 6a. Get or create the IN_PROGRESS reviewSubmission for this app
          r = requests.get(
              f"{BASE}/reviewSubmissions",
              headers=hdr(),
              params={"filter[app]": app_id, "filter[platform]": "IOS", "limit": 10},
          )
          if r.status_code != 200:
              fail("Failed to list review submissions", r)
          existing = None
          for s in r.json().get("data", []):
              state = s["attributes"]["state"]
              print(f"  reviewSubmission {s['id']} state={state}")
              if state in ("READY_FOR_REVIEW", "WAITING_FOR_REVIEW", "IN_REVIEW"):
                  # Already submitted — refuse to double-submit
                  fail(f"reviewSubmission {s['id']} is already in {state}. Cancel it on App Store Connect first if you want to resubmit.")
              if state == "COMPLETE":
                  continue
              # State must be one we can attach to (UNRESOLVED_ISSUES, etc.)
              existing = s
              break
          if existing:
              submission_id = existing["id"]
              print(f"Reusing reviewSubmission id={submission_id} state={existing['attributes']['state']}")
          else:
              payload = {"data": {
                  "type": "reviewSubmissions",
                  "attributes": {"platform": "IOS"},
                  "relationships": {"app": {"data": {"type": "apps", "id": app_id}}},
              }}
              r = requests.post(f"{BASE}/reviewSubmissions", headers=hdr(), json=payload)
              if r.status_code not in (200, 201):
                  fail("Failed to create reviewSubmission", r)
              submission_id = r.json()["data"]["id"]
              print(f"Created reviewSubmission id={submission_id}")

          # 6b. Attach the App Store Version as a reviewSubmissionItem
          payload = {"data": {
              "type": "reviewSubmissionItems",
              "relationships": {
                  "reviewSubmission": {"data": {"type": "reviewSubmissions", "id": submission_id}},
                  "appStoreVersion": {"data": {"type": "appStoreVersions", "id": version_id}},
              },
          }}
          r = requests.post(f"{BASE}/reviewSubmissionItems", headers=hdr(), json=payload)
          if r.status_code in (200, 201):
              print(f"Added appStoreVersion {version_id} as reviewSubmissionItem")
          elif r.status_code == 409:
              print(f"::warning::reviewSubmissionItem already exists for this version — continuing")
          else:
              fail("Failed to add appStoreVersion to review submission", r)

          # 6c. Set submitted=true to actually start the review
          payload = {"data": {
              "type": "reviewSubmissions",
              "id": submission_id,
              "attributes": {"submitted": True},
          }}
          r = requests.patch(f"{BASE}/reviewSubmissions/{submission_id}", headers=hdr(), json=payload)
          if r.status_code in (200, 201):
              print(f"::notice::Submitted reviewSubmission {submission_id} for App Store review.")
          else:
              fail("Submission failed — fix metadata in App Store Connect and re-trigger this workflow", r)

          PYEOF
          rm -rf ~/.private_keys
