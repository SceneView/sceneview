name: Release

on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'
  workflow_dispatch:

# Only one release at a time
concurrency:
  group: release
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  # ── 1. Publish Android library to Maven Central ────────────────────────────
  publish-library:
    name: Publish to Maven Central
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 21
          cache: gradle

      - run: chmod +x ./gradlew

      - name: Check if version already published
        id: check-maven
        run: |
          # Maven Central artifacts are immutable — re-publishing the same
          # version always fails with `Component … already exists`. The npm
          # publish jobs below skip-if-published; mirror that here so a
          # workflow_dispatch retry after a partial failure (e.g. an npm
          # job blew up but Maven succeeded) doesn't leave Create GitHub
          # Release stuck. Closes FU10 (#1003 follow-up).
          if [ "$GITHUB_EVENT_NAME" = "workflow_dispatch" ]; then
            VERSION=$(grep '^VERSION_NAME=' gradle.properties | cut -d= -f2)
          else
            VERSION=${GITHUB_REF_NAME#v}
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          # HEAD against the published .pom — 200 means already on Central.
          STATUS=$(curl -sI -o /dev/null -w "%{http_code}" \
            "https://repo1.maven.org/maven2/io/github/sceneview/sceneview/${VERSION}/sceneview-${VERSION}.pom")
          if [ "$STATUS" = "200" ]; then
            echo "::notice::sceneview ${VERSION} already on Maven Central — skipping publish"
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "Publishing sceneview ${VERSION} (HTTP ${STATUS} on Central probe)"
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Publish
        if: steps.check-maven.outputs.skip != 'true'
        run: ./gradlew publishAndReleaseToMavenCentral --no-daemon --no-parallel --no-configuration-cache
        env:
          ORG_GRADLE_PROJECT_mavenCentralUsername: ${{ secrets.SONATYPE_NEXUS_USERNAME }}
          ORG_GRADLE_PROJECT_mavenCentralPassword: ${{ secrets.SONATYPE_NEXUS_PASSWORD }}
          ORG_GRADLE_PROJECT_signingInMemoryKeyId: ${{ secrets.SIGNING_KEY_ID }}
          ORG_GRADLE_PROJECT_signingInMemoryKey: ${{ secrets.SIGNING_KEY }}
          ORG_GRADLE_PROJECT_signingInMemoryKeyPassword: ${{ secrets.SIGNING_KEY_PASSWORD }}

  # ── 2. Build and publish Dokka API docs ────────────────────────────────────
  publish-api-docs:
    name: Publish API docs
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 21
          cache: gradle

      - run: chmod +x ./gradlew

      - name: Generate Dokka docs
        run: ./gradlew :sceneview:dokkaHtml :arsceneview:dokkaHtml || echo "::warning::Dokka generation failed — skipping"
        continue-on-error: true

      - name: Upload Dokka artifact
        uses: actions/upload-artifact@v7
        with:
          name: dokka-api-docs
          path: |
            sceneview/build/dokka/
            arsceneview/build/dokka/
          retention-days: 1
          if-no-files-found: ignore

  # ── 3. Publish MCP to npm ──────────────────────────────────────────────────
  publish-mcp:
    name: Publish MCP to npm
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 20
          registry-url: https://registry.npmjs.org

      - name: Install dependencies
        working-directory: mcp
        run: npm ci

      - name: Check if version already published
        id: check-mcp
        working-directory: mcp
        run: |
          # MCP has its own version cycle — always use package.json version
          VERSION=$(node -p "require('./package.json').version")
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          # Check the *specific* version rather than the latest dist-tag.
          # npm view <pkg>@<ver> version returns the version string if it exists,
          # or exits non-zero / returns empty if it has never been published.
          PUBLISHED=$(npm view "sceneview-mcp@$VERSION" version 2>/dev/null || echo "")
          if [ "$PUBLISHED" = "$VERSION" ]; then
            echo "::notice::sceneview-mcp@$VERSION already published — skipping"
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "Publishing sceneview-mcp@$VERSION (not yet on npm)"
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Build
        if: steps.check-mcp.outputs.skip != 'true'
        working-directory: mcp
        run: npm run prepare

      - name: Test
        if: steps.check-mcp.outputs.skip != 'true'
        working-directory: mcp
        run: npm test

      - name: Publish
        if: steps.check-mcp.outputs.skip != 'true'
        working-directory: mcp
        run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

  # ── 4. Publish sceneview-web to npm ────────────────────────────────────────
  publish-web:
    name: Publish sceneview-web to npm
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 21
          cache: gradle

      - uses: actions/setup-node@v6
        with:
          node-version: 20
          registry-url: https://registry.npmjs.org

      - run: chmod +x ./gradlew

      - name: Check if version already published
        id: check-web
        run: |
          if [ "$GITHUB_EVENT_NAME" = "workflow_dispatch" ]; then
            VERSION=$(node -p "require('./sceneview-web/package.json').version" 2>/dev/null || echo "0.0.0")
          else
            VERSION=${GITHUB_REF_NAME#v}
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          # Check the *specific* version rather than the latest dist-tag.
          # npm view <pkg>@<ver> version returns the version string if it exists,
          # or exits non-zero / returns empty if it has never been published.
          PUBLISHED=$(npm view "sceneview-web@$VERSION" version 2>/dev/null || echo "")
          if [ "$PUBLISHED" = "$VERSION" ]; then
            echo "::notice::sceneview-web@$VERSION already published — skipping"
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "Publishing sceneview-web@$VERSION (not yet on npm)"
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Build sceneview-web JS library
        if: steps.check-web.outputs.skip != 'true'
        run: ./gradlew :sceneview-web:jsBrowserProductionWebpack

      - name: Prepare and publish npm package
        if: steps.check-web.outputs.skip != 'true'
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          VERSION="${{ steps.check-web.outputs.version }}"
          BUILD_DIR="sceneview-web/build/kotlin-webpack/js/productionExecutable"
          # Hand-written TypeScript declarations — Kotlin/JS 2.x doesn't emit
          # a `.d.ts` from `@JsExport` by default and the API surface is small
          # enough that a hand-maintained file is cheaper than wiring
          # dtsGenerator. See #946.
          cp sceneview-web/sceneview-web.d.ts "$BUILD_DIR/sceneview-web.d.ts"
          cat > "$BUILD_DIR/package.json" << EOF
          {
            "name": "sceneview-web",
            "version": "$VERSION",
            "description": "SceneView for Web — 3D rendering with Filament.js (WebGL2/WASM)",
            "main": "sceneview-web.js",
            "types": "sceneview-web.d.ts",
            "keywords": ["3d", "webgl", "filament", "sceneview", "gltf", "wasm"],
            "homepage": "https://github.com/sceneview/sceneview",
            "repository": {
              "type": "git",
              "url": "https://github.com/sceneview/sceneview.git",
              "directory": "sceneview-web"
            },
            "license": "Apache-2.0"
          }
          EOF
          cd "$BUILD_DIR"
          npm publish --access public

  # ── 4b. Publish React Native bindings to npm ──────────────────────────────
  publish-rn:
    name: Publish @sceneview-sdk/react-native to npm
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 20
          registry-url: https://registry.npmjs.org

      - name: Check if version already published
        id: check-rn
        run: |
          if [ "$GITHUB_EVENT_NAME" = "workflow_dispatch" ]; then
            VERSION=$(node -p "require('./react-native/react-native-sceneview/package.json').version")
          else
            VERSION=${GITHUB_REF_NAME#v}
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          # @sceneview-sdk/react-native is scoped; we check the specific
          # version rather than the latest dist-tag so a re-run after a
          # partial failure becomes idempotent.
          PUBLISHED=$(npm view "@sceneview-sdk/react-native@$VERSION" version 2>/dev/null || echo "")
          if [ "$PUBLISHED" = "$VERSION" ]; then
            echo "::notice::@sceneview-sdk/react-native@$VERSION already published — skipping"
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "Publishing @sceneview-sdk/react-native@$VERSION (not yet on npm)"
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Sync package version from VERSION_NAME
        if: steps.check-rn.outputs.skip != 'true'
        run: |
          # Belt-and-suspenders: the version-bump skill already updates
          # this file in the bump commit, but a workflow_dispatch run
          # against a stale tree would otherwise publish whatever
          # package.json currently says. Re-derive from the tag here.
          VERSION="${{ steps.check-rn.outputs.version }}"
          cd react-native/react-native-sceneview
          npm version "$VERSION" --no-git-tag-version --allow-same-version

      - name: Install + build the lib
        if: steps.check-rn.outputs.skip != 'true'
        working-directory: react-native/react-native-sceneview
        run: |
          # react-native 0.84.x peer-deps require @types/react@^19 but the
          # bridge's devDeps still pin @types/react@^18 (RN bridges scoped
          # to RN 0.72.x consumers). The v4.1.0 release failed at this step
          # with ERESOLVE; --legacy-peer-deps unblocks the publish without
          # forcing a breaking @types/react bump on consumers. Real fix
          # tracked in #909 (RN/Flutter bridges coverage).
          npm install --no-audit --no-fund --legacy-peer-deps
          npm run build

      - name: Publish to npm
        if: steps.check-rn.outputs.skip != 'true'
        working-directory: react-native/react-native-sceneview
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: npm publish --access public

  # ── 4c. Tag SceneViewSwift for Swift Package Manager consumers ────────────
  # SPM has no central registry — consumers point Xcode at the git URL and
  # SPM resolves the highest tag matching their version constraint. We
  # therefore don't run a publish step; the `v[0-9]+.[0-9]+.[0-9]+` push
  # tag that triggered this workflow IS the SPM publish. This job just
  # validates that the tag's commit actually contains a Package.swift
  # rooted at SceneViewSwift/ so a malformed tag doesn't quietly poison
  # `.package(url:from:)` resolution for every iOS user.
  validate-spm:
    name: Validate SceneViewSwift SPM tag
    runs-on: ubuntu-latest
    timeout-minutes: 5
    # Runs on both tag pushes AND workflow_dispatch — previously gated on
    # `startsWith(github.ref, 'refs/tags/v')` which made it SKIP on dispatch,
    # which then blocked `create-release` (whose gate required
    # `validate-spm.result == 'success'` strictly). Closes FU11 (#1003 follow-up).
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6
      - name: Assert both root and SceneViewSwift Package.swift exist
        run: |
          # The monorepo ships TWO Package.swift manifests:
          #   1. Root (./Package.swift) — what SPM consumers point at:
          #      `https://github.com/sceneview/sceneview.git`. Added in #920
          #      so iOS users don't need the separate `sceneview-swift` mirror
          #      repo that historically got stuck on v4.0.0.
          #   2. Sub-manifest (./SceneViewSwift/Package.swift) — kept in place
          #      so the legacy `sceneview-swift` mirror repo (a flat copy of
          #      the SceneViewSwift/ subtree) continues to build for any
          #      consumer that hasn't migrated yet.
          # Both must point at the SceneViewSwift target so a malformed tag
          # doesn't quietly poison `.package(url:from:)` resolution.
          missing=()
          [ -f "Package.swift" ] || missing+=("Package.swift (root)")
          [ -f "SceneViewSwift/Package.swift" ] || missing+=("SceneViewSwift/Package.swift")
          if [ ${#missing[@]} -gt 0 ]; then
            echo "::error::Missing at tag ${GITHUB_REF_NAME}: ${missing[*]}"
            exit 1
          fi
          # Both manifests must declare the SceneViewSwift product. The
          # `.library(...)` block in SwiftPM manifests is conventionally
          # written across multiple lines (`.library(\n    name: "X",\n    targets: ...)`)
          # so we flatten the file to one line before the regex check
          # (the previous single-line grep silently failed on v4.1.0).
          for f in Package.swift SceneViewSwift/Package.swift; do
            if ! tr '\n' ' ' < "$f" | grep -qE '\.library\(\s*name:\s*"SceneViewSwift"'; then
              echo "::error::$f does not declare a SceneViewSwift product"
              exit 1
            fi
          done
          echo "::notice::Both SPM manifests present and well-formed at tag ${GITHUB_REF_NAME}"

  # NOTE: pub.dev / Flutter publish is not yet automated. Requires a
  # `PUB_TOKEN` org-level secret + `dart pub publish --force`. Tracked
  # separately in #962 follow-up.

  # ── 5. Create GitHub Release with auto-generated notes ────────────────────
  create-release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    timeout-minutes: 5
    needs: [publish-library, publish-mcp, publish-web, publish-rn, validate-spm]
    # All three publishers must NOT have failed before the GitHub Release is
    # cut. Previously the gate only checked `publish-library == 'success'`,
    # so a Maven Central success with an npm publish failure still
    # produced a "v4.0.9" GitHub Release advertising packages that never
    # shipped — and users `npm i sceneview-mcp@4.0.9` would see the
    # version was missing from the registry. Skipped (because the version
    # is already on the registry) is OK — only an outright failure blocks.
    # See #962.
    # Skipped is OK (e.g. version already on the registry) — only outright
    # failure blocks. Previously `publish-library` and `validate-spm` were
    # checked with strict `== 'success'`, which made the GitHub Release
    # unreachable on workflow_dispatch retries (publish-library would
    # already-exists fail or validate-spm would skip). Now harmonised with
    # the npm jobs' `!= 'failure' && != 'cancelled'` pattern. Closes FU13.
    if: |
      always()
      && needs.publish-library.result != 'failure'
      && needs.publish-library.result != 'cancelled'
      && needs.publish-mcp.result != 'failure'
      && needs.publish-mcp.result != 'cancelled'
      && needs.publish-web.result != 'failure'
      && needs.publish-web.result != 'cancelled'
      && needs.publish-rn.result != 'failure'
      && needs.publish-rn.result != 'cancelled'
      && needs.validate-spm.result != 'failure'
      && needs.validate-spm.result != 'cancelled'
      && startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6

      - uses: softprops/action-gh-release@v3
        with:
          generate_release_notes: true
          make_latest: true
