name: CI Gate

# Single always-on aggregator status check for branch protection.
#
# WHY THIS EXISTS (#1314)
# ----------------------
# `main` is merged fire-and-forget (`gh pr merge --squash --auto`). For
# auto-merge to actually gate on CI, branch protection must require a
# status check. But the repo's real CI workflows (ci.yml, ios.yml,
# telemetry-ci.yml) all use workflow-level `paths`/`paths-ignore` filters
# — and ci.yml additionally per-job `if:`-gates jobs on a path filter — so
# a docs-only or scripts-only PR runs ZERO (or `skipped`) jobs. Requiring
# any of those checks directly would leave such a PR stuck on
# "Expected — waiting for status" forever.
#
# DESIGN CHOICE
# -------------
# A GitHub job can only `needs:` jobs in its OWN workflow, and the repo
# has several PR-triggered workflows with different path filters — a single
# `needs:`-based gate cannot see across them. A `workflow_run`-triggered
# gate is unreliable as a required check (its check run attaches to the
# branch, not the PR head SHA, so the PR merge box never sees it).
#
# So this is a dedicated workflow with a `pull_request` trigger and NO
# path filter — it therefore runs on EVERY PR and ALWAYS reports the
# `CI Gate` status. Its single job polls the GitHub Checks API for the
# PR head SHA, waits for every OTHER check run to finish, and:
#   - FAILS  if any other check concluded `failure`/`cancelled`/`timed_out`
#   - PASSES if every other check is `success`, `skipped`, or `neutral`
# A path-filtered-out workflow simply produces no check runs for that SHA
# (or its `if:`-skipped jobs report `skipped`) — either way the gate is
# green, so docs/scripts/CI-only PRs merge without jamming.
#
# Branch protection on `main` requires ONLY this `CI Gate` check.

on:
  pull_request:
    branches: [main]
    # ⛔ Intentionally NO paths / paths-ignore filter. This workflow MUST
    # run on every PR so the `CI Gate` status is always reported — that
    # is the whole point of the aggregator pattern (#1314).
  workflow_dispatch:

concurrency:
  group: ci-gate-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  checks: read
  contents: read
  pull-requests: read

jobs:
  ci-gate:
    name: CI Gate
    runs-on: ubuntu-latest
    # The internal poll loop self-terminates at a 25-min deadline (+30s
    # warm-up sleep). The job timeout sits comfortably above that so the
    # loop's own "::error:: timed out waiting for …" message is what
    # surfaces — a hard runner kill would give no diagnostic. 35 min keeps
    # a ~9-min cushion above the internal ~25.5-min worst case (#1360).
    timeout-minutes: 35
    steps:
      - name: Aggregate all PR check conclusions
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
          REPO: ${{ github.repository }}
          # This job's own check run name — excluded from the aggregation
          # so the gate never waits on itself.
          SELF_CHECK: CI Gate
        shell: bash
        run: |
          set -euo pipefail

          # workflow_dispatch has no PR context — nothing to aggregate.
          if [ -z "${HEAD_SHA:-}" ]; then
            echo "No pull_request context (manual dispatch) — nothing to gate."
            exit 0
          fi

          echo "Aggregating check runs for $REPO @ $HEAD_SHA"

          # ── Minimum-check guard (#1543) ──────────────────────────────────
          # WHY A NAME-BASED GUARD, NOT A BLUNT COUNT
          # -----------------------------------------
          # Without a lower bound, the gate can exit green prematurely: if a
          # slow, non-path-gated workflow has not yet registered ANY check run
          # for this SHA, the `others` set may be non-empty (some fast
          # workflow already finished) yet still missing the workflow we
          # actually care about — and an all-`completed` snapshot would pass.
          #
          # A blunt "require N checks" count is itself a false-negative trap:
          # a legitimately light PR (e.g. docs-only) runs FEWER checks by
          # design, so a fixed minimum would jam it forever.
          #
          # Instead we require, by NAME, the three jobs in `ci.yml` that have
          # NO per-job `if:` filter and therefore run on every PR for which
          # `ci.yml` triggers at all: `changes`, `repo-hygiene`,
          # `quality-gate`. But `ci.yml` itself carries a workflow-level
          # `paths-ignore` (docs / website / branding / *.md / llms*.txt /
          # LICENSE) — for a PR that touches ONLY those paths, `ci.yml` never
          # runs and those core checks legitimately never appear. So the
          # requirement is conditional: we first ask GitHub for this PR's
          # changed files and decide whether `ci.yml` is expected to run.
          # Only when it IS expected do we block the green exit until all
          # three core checks have been observed.
          #
          # This keeps the gate honest for code PRs (a missing core workflow
          # can no longer slip through as green) without jamming doc-only PRs.

          # Core check-run names from ci.yml jobs that have no `if:` gate.
          # Keep in sync with `name:` fields in .github/workflows/ci.yml.
          CORE_CHECKS=$'Detect changed paths\nRepo hygiene checks\nQuality gate (full)'

          # Decide whether ci.yml is expected to run for this PR by replaying
          # its workflow-level `paths-ignore`: ci.yml runs unless EVERY
          # changed file matches an ignored path. Keep this list in sync with
          # the `pull_request.paths-ignore` block of .github/workflows/ci.yml.
          require_core=false
          PR_NUMBER='${{ github.event.pull_request.number }}'
          if [ -n "${PR_NUMBER:-}" ]; then
            changed=$(gh api --paginate \
              "repos/$REPO/pulls/$PR_NUMBER/files" \
              --jq '.[].filename' || true)
            if [ -z "$changed" ]; then
              # Could not enumerate files (API hiccup, huge PR) — fail safe
              # by requiring the core checks rather than risking a premature
              # green on a code PR.
              echo "Could not list PR files — conservatively requiring core ci.yml checks."
              require_core=true
            else
              non_ignored=$(echo "$changed" | grep -vE \
                '^(website-static/|docs/|marketing/|branding/|llms[^/]*\.txt$|LICENSE$)|(^|/)[^/]*\.md$' \
                || true)
              if [ -n "$non_ignored" ]; then
                require_core=true
                echo "PR touches non-doc paths — ci.yml is expected; requiring core checks:"
                echo "$CORE_CHECKS" | while IFS= read -r n; do echo "  - $n"; done
              else
                echo "PR touches only docs/website/branding paths — ci.yml is path-filtered out; core checks not required."
              fi
            fi
          else
            echo "No PR number in context — conservatively requiring core ci.yml checks."
            require_core=true
          fi

          # Poll until every non-self check run for this SHA has finished.
          # GitHub registers a workflow's check runs within a few seconds
          # of the PR event, so we wait briefly before the first read to
          # avoid a false "all green" on an empty list.
          #
          # The fixed warm-up sleep alone is not enough: if another
          # workflow's check runs register *after* the sleep, the first
          # loop iteration sees an empty `others` set and would pass the
          # gate prematurely. So we additionally refuse to exit green
          # until at least one non-self check run has been observed AND
          # (when applicable) every required core check has registered.
          deadline=$(( $(date +%s) + 25 * 60 ))
          sleep 30
          seen_any_other=false

          while :; do
            # All check runs for the head commit (handles >100 via paging).
            runs=$(gh api --paginate \
              "repos/$REPO/commits/$HEAD_SHA/check-runs" \
              --jq '.check_runs[] | {name: .name, status: .status, conclusion: .conclusion}')

            # Drop this gate's own check run from consideration.
            others=$(echo "$runs" | jq -c --arg self "$SELF_CHECK" 'select(.name != $self)')

            # Names of every non-self check run observed so far.
            seen_names=$(echo "$others" | jq -r '.name' | sort -u)

            # Core checks that are required but not yet registered.
            missing_core=""
            if [ "$require_core" = true ]; then
              while IFS= read -r core; do
                [ -z "$core" ] && continue
                if ! echo "$seen_names" | grep -qxF "$core"; then
                  missing_core+="${core}"$'\n'
                fi
              done <<< "$CORE_CHECKS"
            fi

            if [ -z "$others" ] || [ -n "$missing_core" ]; then
              if [ "$(date +%s)" -ge "$deadline" ]; then
                if [ -z "$others" ]; then
                  echo "::error::Timed out — no other CI check runs ever registered for this SHA."
                else
                  echo "::error::Timed out — required core CI check runs never registered for this SHA:"
                  echo "$missing_core" | sort -u | while IFS= read -r n; do [ -n "$n" ] && echo "  - $n"; done
                fi
                exit 1
              fi
              if [ -z "$others" ]; then
                echo "No other check runs reported for this SHA yet — waiting for at least one to register."
              else
                echo "Waiting for required core CI check runs to register:"
                echo "$missing_core" | sort -u | while IFS= read -r n; do [ -n "$n" ] && echo "  - $n"; done
              fi
              sleep 20
              continue
            fi

            seen_any_other=true

            pending=$(echo "$others" | jq -r 'select(.status != "completed") | .name')
            if [ -z "$pending" ] && [ "$seen_any_other" = true ]; then
              break
            fi

            if [ "$(date +%s)" -ge "$deadline" ]; then
              echo "::error::Timed out waiting for CI checks to complete:"
              echo "$pending" | sort -u | while IFS= read -r n; do echo "  - $n"; done
              exit 1
            fi

            echo "Waiting for checks to finish:"
            echo "$pending" | sort -u | while IFS= read -r n; do echo "  - $n"; done
            sleep 20
          done

          echo ""
          echo "All other check runs completed. Conclusions:"
          echo "$others" | jq -r '"  - \(.name): \(.conclusion)"' | sort -u

          # A real failure flips the gate red. `skipped`/`neutral`/`success`
          # all pass — path-filtered-out jobs report `skipped`.
          #
          # `stale` is NOT treated as a failure: GitHub marks a check run
          # `stale` when a newer commit (or `cancel-in-progress`) supersedes
          # its run. The current head SHA always gets a fresh run, so a
          # `stale` conclusion on this SHA's checks is noise, not a defect —
          # treating it as red would flip `CI Gate` red on an otherwise
          # green PR.
          #
          # `action_required` is NOT treated as a failure (#1543): GitHub
          # assigns it when a workflow on a fork PR is waiting for a
          # maintainer to approve the run. That is a pending-equivalent
          # state — the workflow has not failed, it simply has not been
          # allowed to start. The poll loop above only `break`s once every
          # non-self check run is `completed`; an `action_required` run
          # reports status `completed` with conclusion `action_required`, so
          # it does NOT keep the loop spinning, but it also must NOT flip the
          # gate red. The maintainer's approval (or its absence) is the
          # human gate for fork PRs — the aggregator stays green so the PR
          # merge box shows the real state instead of a misleading red.
          failed=$(echo "$others" \
            | jq -r 'select(.conclusion == "failure"
                          or .conclusion == "cancelled"
                          or .conclusion == "timed_out") | .name')

          if [ -n "$failed" ]; then
            echo ""
            echo "::error::One or more required CI checks failed:"
            echo "$failed" | sort -u | while IFS= read -r n; do echo "  - $n"; done
            exit 1
          fi

          echo ""
          echo "CI Gate passed — every CI check succeeded or was skipped."
