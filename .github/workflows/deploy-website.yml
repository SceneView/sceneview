name: Deploy Website

on:
  push:
    branches: [main]
    paths:
      - 'website-static/**'
  workflow_dispatch:

concurrency:
  group: deploy-website
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          deploy_key: ${{ secrets.PAGES_DEPLOY_KEY }}
          external_repository: sceneview/sceneview.github.io
          publish_branch: main
          publish_dir: ./website-static
          keep_files: true
          commit_message: "deploy: ${{ github.event.head_commit.message }}"
          user_name: github-actions[bot]
          user_email: github-actions[bot]@users.noreply.github.com

      # GitHub Pages legacy auto-build on `sceneview/sceneview.github.io`
      # has been intermittently failing to fire on the push made by the
      # step above (verified 2026-05-07: 2 pushes, 0 auto-builds). Force
      # a build by hitting the Pages API. Requires a PAT in
      # `secrets.PAGES_REBUILD_TOKEN` with `repo` scope on
      # `sceneview/sceneview.github.io` — falls through silently if the
      # secret isn't set, in which case run manually:
      #   gh api -X POST repos/sceneview/sceneview.github.io/pages/builds
      - name: Trigger GitHub Pages build (workaround for auto-build skip)
        if: ${{ env.PAGES_TOKEN != '' }}
        env:
          PAGES_TOKEN: ${{ secrets.PAGES_REBUILD_TOKEN }}
        continue-on-error: true
        run: |
          curl -sSf -X POST \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer $PAGES_TOKEN" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            https://api.github.com/repos/sceneview/sceneview.github.io/pages/builds \
            | head -c 200
