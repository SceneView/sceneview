name: Discord Notifications

# Posts to Discord when a release is published or an issue is opened.
#
# SETUP: Add a DISCORD_WEBHOOK_URL secret in your repo settings:
#   1. In Discord, go to Server Settings > Integrations > Webhooks > New Webhook
#   2. Choose the channel (e.g. #releases or #announcements)
#   3. Copy the webhook URL
#   4. In GitHub, go to Settings > Secrets and variables > Actions > New repository secret
#   5. Name: DISCORD_WEBHOOK_URL   Value: <the webhook URL>

on:
  release:
    types: [published]
  issues:
    types: [opened]

# One notification run per triggering event; a duplicate webhook delivery
# (e.g. an issue edited-then-reopened storm) cancels the stale in-flight run.
concurrency:
  group: discord-notify-${{ github.event.release.id || github.event.issue.number || github.run_id }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  notify-release:
    if: github.event_name == 'release'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Post release to Discord
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          # User-controlled fields — passed via env, never interpolated into the
          # inline script, to prevent GitHub Actions shell script injection.
          RELEASE_PRERELEASE: ${{ github.event.release.prerelease }}
          RELEASE_TAG_NAME: ${{ github.event.release.tag_name }}
          RELEASE_NAME: ${{ github.event.release.name }}
          RELEASE_URL: ${{ github.event.release.html_url }}
        run: |
          if [ -z "$DISCORD_WEBHOOK_URL" ]; then
            echo "DISCORD_WEBHOOK_URL secret is not set — skipping notification."
            exit 0
          fi

          if [ "$RELEASE_PRERELEASE" = "true" ]; then
            EMOJI="🧪"
            LABEL="Pre-release"
          else
            EMOJI="🚀"
            LABEL="New Release"
          fi

          PAYLOAD=$(jq -n \
            --arg title "$EMOJI $LABEL: $RELEASE_TAG_NAME" \
            --arg name "$RELEASE_NAME" \
            --arg url "$RELEASE_URL" \
            --arg ts "$(date -u +%Y-%m-%dT%H:%M:%SZ)" \
            '{embeds: [{title: $title, description: ("**" + $name + "**\n\n[View release notes](" + $url + ")"), color: 3447003, footer: {text: "SceneView — 3D & AR SDK"}, timestamp: $ts}]}')

          HTTP_STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
            -H "Content-Type: application/json" \
            -d "$PAYLOAD" \
            "$DISCORD_WEBHOOK_URL")
          if [ "$HTTP_STATUS" -lt 200 ] || [ "$HTTP_STATUS" -ge 300 ]; then
            echo "::warning::Discord webhook returned HTTP $HTTP_STATUS"
          else
            echo "Discord notification sent (HTTP $HTTP_STATUS)"
          fi

  notify-issue:
    if: github.event_name == 'issues'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Post new issue to Discord
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          # User-controlled fields — passed via env, never interpolated into the
          # inline script, to prevent GitHub Actions shell script injection.
          ISSUE_NUMBER: ${{ github.event.issue.number }}
          ISSUE_TITLE: ${{ github.event.issue.title }}
          ISSUE_URL: ${{ github.event.issue.html_url }}
          ISSUE_AUTHOR: ${{ github.event.issue.user.login }}
        run: |
          if [ -z "$DISCORD_WEBHOOK_URL" ]; then
            echo "DISCORD_WEBHOOK_URL secret is not set — skipping notification."
            exit 0
          fi

          PAYLOAD=$(jq -n \
            --arg title "🐛 New Issue #$ISSUE_NUMBER" \
            --arg issue_title "$ISSUE_TITLE" \
            --arg url "$ISSUE_URL" \
            --arg author "$ISSUE_AUTHOR" \
            --arg ts "$(date -u +%Y-%m-%dT%H:%M:%SZ)" \
            '{embeds: [{title: $title, description: ("**" + $issue_title + "**\n\nOpened by [" + $author + "](https://github.com/" + $author + ")\n[View issue](" + $url + ")"), color: 15105570, footer: {text: "SceneView — 3D & AR SDK"}, timestamp: $ts}]}')

          HTTP_STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
            -H "Content-Type: application/json" \
            -d "$PAYLOAD" \
            "$DISCORD_WEBHOOK_URL")
          if [ "$HTTP_STATUS" -lt 200 ] || [ "$HTTP_STATUS" -ge 300 ]; then
            echo "::warning::Discord webhook returned HTTP $HTTP_STATUS"
          else
            echo "Discord notification sent (HTTP $HTTP_STATUS)"
          fi
