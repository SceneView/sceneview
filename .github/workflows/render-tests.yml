name: Render Tests

on:
  # Render tests no longer run on PRs — they are non-blocking
  # (`continue-on-error: true`), spin up a KVM-accelerated emulator
  # + an iOS Simulator + Playwright web, and the screenshots they produce
  # were rarely consulted by PR reviewers. The signal is still captured
  # on every push to main, so post-merge regressions surface in the
  # Actions tab without burning ~30 min × multiple PRs per day. Trigger
  # manually via workflow_dispatch when you want to vet a feature branch.
  #
  # Strictly path-gated (#1311, #1321): runs only when render-affecting
  # source actually changes. SKIPPED on doc-only, CI-only (`.github/**`),
  # and `mcp/`-only merges — none of those can change a rendered frame.
  # squash-merge means `main` HEAD differs from every PR commit, so this
  # main-push run still catches integration regressions a PR build can't.
  push:
    branches: [main]
    paths:
      - 'sceneview/src/**'
      - 'arsceneview/src/**'
      - 'sceneview-core/src/**'
      - 'samples/**'
      - 'SceneViewSwift/**'
      - 'gradle/**'
  workflow_dispatch:
  # Invoked by nightly-ci.yml so the scheduled full-validation run reuses
  # this render-test definition rather than duplicating it. See #1324.
  workflow_call:

concurrency:
  group: render-tests-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  # ── Android library render tests ──────────────────────────────────────────
  android-library-render:
    name: Android library render tests (emulator)
    runs-on: ubuntu-latest
    timeout-minutes: 30
    # SwiftShader emulator render tests are inherently flaky (JNI teardown
    # races, GPU emulation timing).  Mark non-blocking so a spurious red X
    # doesn't scare contributors — the workflow is already NOT a required
    # status check.  Individual job status still visible in the Actions tab.
    continue-on-error: true

    # The 3-shard emulator matrix (#1119, PR #1145) was REVERTED to a single
    # job: all 5 render-test classes are class-level `@Ignore`'d on
    # SwiftShader CI (Filament `readPixels` crash, tracked in #803), so
    # sharding boots 3 emulators to run 0 tests — strictly more CI cost for
    # the same 0 coverage. Re-apply the matrix scaffold (DemoParameters
    # alone; Visual+Geometry paired; Smoke+Lighting paired) once #803 lifts
    # the `@Ignore`s and real per-class wall-clocks justify the parallelism.

    steps:
      - uses: actions/checkout@v6

      - uses: ./.github/actions/setup-gradle

      # Enable KVM for hardware acceleration (required for emulator performance)
      - name: Enable KVM
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      - name: Build androidTest APK
        run: ./gradlew :sceneview:assembleDebugAndroidTest --stacktrace

      - name: Run render tests on emulator
        uses: ReactiveCircus/android-emulator-runner@v2
        with:
          api-level: 30
          target: google_apis
          arch: x86_64
          emulator-options: -no-window -gpu swiftshader_indirect -no-snapshot -noaudio -no-boot-anim
          disable-animations: true
          script: |
            # Run the whole render-test suite in one emulator. Every target
            # class is currently `@Ignore`'d (#803), so this completes fast.
            ./gradlew :sceneview:connectedDebugAndroidTest --stacktrace

            # Pull rendered screenshots from device for visual inspection
            mkdir -p render-output
            adb pull /sdcard/Android/data/io.github.sceneview.test/files/render-test-output/ render-output/ || true

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: android-library-render-results
          path: sceneview/build/reports/androidTests/
          if-no-files-found: ignore

      - name: Upload render screenshots
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: android-library-render-screenshots
          path: render-output/
          if-no-files-found: ignore

  # ── Android demo app screenshot capture ───────────────────────────────────
  android-demo-screenshots:
    name: Android demo app screenshots (emulator)
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - uses: actions/checkout@v6

      - uses: ./.github/actions/setup-gradle

      - name: Enable KVM
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      - name: Build demo APK
        env:
          ARCORE_API_KEY: ${{ secrets.ARCORE_API_KEY }}
        run: ./gradlew :samples:android-demo:assembleDebug --stacktrace

      # Google's Android CLI — UI-tree JSON, LF/CRLF-safe screenshots, single
      # entrypoint for install+launch. https://developer.android.com/tools/agents/android-cli
      # Source: https://dl.google.com/android/cli (Google's official SDK CDN —
      # same trust root as the SDK Manager, so a plain HTTPS fetch is sufficient).
      - name: Install Android CLI
        run: |
          mkdir -p "$HOME/.local/bin"
          # --retry guards against cold-CDN flake on dl.google.com.
          curl -fsSL --retry 3 --retry-delay 5 \
            https://dl.google.com/android/cli/latest/linux_x86_64/android \
            -o "$HOME/.local/bin/android"
          chmod +x "$HOME/.local/bin/android"
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"
          # `--version` accepts the first-run ToS prompt non-interactively.
          # `--no-metrics` disables telemetry for every subsequent call.
          "$HOME/.local/bin/android" --no-metrics --version

      - name: Capture demo screenshots
        uses: ReactiveCircus/android-emulator-runner@v2
        with:
          api-level: 30
          target: google_apis
          arch: x86_64
          emulator-options: -no-window -gpu swiftshader_indirect -no-snapshot -noaudio -no-boot-anim
          disable-animations: true
          script: |
            # The ReactiveCircus action runs this `script:` in its own subshell;
            # GitHub's $GITHUB_PATH augmentation does NOT propagate here, so we
            # re-add ~/.local/bin explicitly.
            export PATH="$HOME/.local/bin:$PATH"

            # Block until the emulator finishes booting. The action waits for
            # device-online but not for package-manager readiness — `android run`
            # would otherwise race the PM during cold boot.
            #
            # The `script:` block is executed line-by-line by the action via
            # `sh -c <line>` (not `bash <script>`), so a multi-line `while … done`
            # gets sliced — the `while` opens a syntax that never sees its `done`
            # on the same invocation. The whole loop must live on ONE physical
            # line. POSIX-only (dash): `[ … ]` + `=`, no `[[ … ]]`.
            adb wait-for-device
            attempts=0; while [ "$(adb shell getprop sys.boot_completed 2>/dev/null | tr -d '\r\n')" != "1" ] && [ "$attempts" -lt 60 ]; do sleep 2; attempts=$((attempts + 1)); done

            # Install + launch atomically via the Android CLI. MUST live on a
            # single physical line — see #1153: ReactiveCircus runs each line
            # via `sh -c <line>`, so a trailing `\` becomes a literal argv
            # token under POSIX `sh` and the second line ships standalone.
            # The whole loop above (`attempts=0; while ...; done`) follows
            # the same one-line rule and is documented at line 160-164.
            android --no-metrics run --apks=samples/android-demo/build/outputs/apk/debug/android-demo-debug.apk --activity=io.github.sceneview.demo/.MainActivity || true
            sleep 10

            mkdir -p demo-screenshots
            android --no-metrics screen capture --output demo-screenshots/01_demo_main.png

            # Tab swipes still go through adb — `android` CLI has no input-event API.
            adb shell input swipe 800 1500 200 1500 300
            sleep 5
            android --no-metrics screen capture --output demo-screenshots/02_demo_tab2.png

            adb shell input swipe 800 1500 200 1500 300
            sleep 5
            android --no-metrics screen capture --output demo-screenshots/03_demo_tab3.png

            adb shell input swipe 800 1500 200 1500 300
            sleep 5
            android --no-metrics screen capture --output demo-screenshots/04_demo_tab4.png

      - name: Upload demo screenshots
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: android-demo-screenshots
          path: demo-screenshots/
          if-no-files-found: ignore

  # ── AR demo playback screenshot regression ────────────────────────────────
  # Frame-indexed AR screenshot pipeline (#1050): replays the bundled ARCore
  # recording through ARRecordPlaybackDemo and captures the rendered frame at
  # fixed ARCore frame indices (f=30/60/120/180) for golden comparison.
  #
  # Non-blocking by design: until goldens are captured on this pinned emulator
  # profile and committed under
  # `samples/android-demo/src/androidTest/assets/ar-screenshot-goldens/`, the
  # test `assumeTrue`-skips every comparison and uploads the first-run captures
  # as an artifact. Once a maintainer pulls + reviews + commits those PNGs the
  # job becomes a real regression gate. See that dir's README for the flow.
  ar-demo-playback-screenshots:
    name: AR demo playback screenshots (emulator)
    runs-on: ubuntu-latest
    timeout-minutes: 45
    # AR emulator playback is inherently flaky (ARCore service init races,
    # SwiftShader GPU timing). Keep non-blocking — it is NOT a required check.
    continue-on-error: true

    steps:
      - uses: actions/checkout@v6

      - uses: ./.github/actions/setup-gradle

      - name: Enable KVM
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      - name: Build demo + androidTest APKs
        env:
          ARCORE_API_KEY: ${{ secrets.ARCORE_API_KEY }}
        run: ./gradlew :samples:android-demo:assembleDebug :samples:android-demo:assembleDebugAndroidTest --stacktrace

      - name: Run AR playback screenshot pipeline
        uses: ReactiveCircus/android-emulator-runner@v2
        with:
          # Pinned emulator profile (#1050 acceptance §4) — goldens MUST be
          # captured against this exact config or GPU divergence flags false
          # positives. Re-baseline only after pulling first-run captures from a
          # run of this same profile.
          api-level: 30
          target: google_apis
          arch: x86_64
          emulator-options: -no-window -gpu swiftshader_indirect -no-snapshot -noaudio -no-boot-anim
          disable-animations: true
          script: |
            adb wait-for-device
            attempts=0; while [ "$(adb shell getprop sys.boot_completed 2>/dev/null | tr -d '\r\n')" != "1" ] && [ "$attempts" -lt 60 ]; do sleep 2; attempts=$((attempts + 1)); done

            # ARCore playback still needs the ARCore runtime installed even
            # though the camera feed comes from the bundled MP4. Sideload the
            # official multi-arch APK — see samples/android-demo/AR_TESTING.md.
            # `|| true`: a sideload failure just makes the test assumeTrue-skip.
            ARCORE_VERSION=1.54.0
            curl -L --retry 3 --retry-delay 5 -o /tmp/arcore.apk "https://github.com/google-ar/arcore-android-sdk/releases/download/${ARCORE_VERSION}/Google_Play_Services_for_AR_${ARCORE_VERSION}.apk" || true
            adb install -r /tmp/arcore.apk || true

            # Run only the frame-indexed AR screenshot test class.
            ./gradlew :samples:android-demo:connectedDebugAndroidTest -Pandroid.testInstrumentationRunnerArguments.class=io.github.sceneview.demo.ar.ARPlaybackScreenshotTest --stacktrace || true

            # Pull the captures the test wrote (first-run goldens, diffs, actuals).
            mkdir -p ar-screenshot-output
            adb pull /sdcard/Download/SceneView/test-captures/ ar-screenshot-output/ || true

      - name: Upload AR screenshot captures
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: ar-demo-playback-screenshots
          path: ar-screenshot-output/
          if-no-files-found: ignore

      - name: Upload AR test results
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: ar-demo-playback-results
          path: samples/android-demo/build/reports/androidTests/
          if-no-files-found: ignore

  # ── iOS render tests ──────────────────────────────────────────────────────
  ios-render:
    name: iOS screenshot tests (Simulator)
    runs-on: macos-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v6

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode.app/Contents/Developer

      - name: Resolve SPM dependencies
        working-directory: samples/ios-demo
        run: |
          xcodebuild -resolvePackageDependencies \
            -project SceneViewDemo.xcodeproj \
            -scheme SceneViewDemo \
            -destination 'platform=iOS Simulator,name=iPhone 16,OS=latest' \
            CODE_SIGNING_ALLOWED=NO || true

      - name: Run screenshot tests
        working-directory: samples/ios-demo
        run: |
          xcodebuild test \
            -project SceneViewDemo.xcodeproj \
            -scheme SceneViewDemo \
            -destination 'platform=iOS Simulator,name=iPhone 16,OS=latest' \
            -resultBundlePath TestResults.xcresult \
            CODE_SIGNING_ALLOWED=NO \
            2>&1 | tail -200 || true

      - name: Extract screenshots from xcresult
        if: always()
        working-directory: samples/ios-demo
        run: |
          mkdir -p ios-render-screenshots
          # Export attachments from xcresult bundle
          if [ -d TestResults.xcresult ]; then
            xcresulttool get --format json --path TestResults.xcresult > ios-render-screenshots/results.json 2>/dev/null || true
            # Copy the entire xcresult for artifact upload
            cp -R TestResults.xcresult ios-render-screenshots/ 2>/dev/null || true
          fi

      - name: Upload iOS test results
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: ios-render-screenshots
          path: samples/ios-demo/ios-render-screenshots/
          if-no-files-found: ignore

      - name: Upload xcresult bundle
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: ios-xcresult
          path: samples/ios-demo/TestResults.xcresult
          if-no-files-found: ignore

  # ── Web render tests ──────────────────────────────────────────────────────
  web-render:
    name: Web Playwright screenshot tests
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 20

      - name: Install Playwright
        working-directory: samples/web-demo
        run: |
          npm init -y 2>/dev/null || true
          npm install --save-dev @playwright/test
          npx playwright install chromium --with-deps

      - name: Run Playwright tests
        working-directory: samples/web-demo
        run: npx playwright test --reporter=html || true

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: web-playwright-report
          path: samples/web-demo/playwright-report/
          if-no-files-found: ignore

      - name: Upload test screenshots
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: web-render-screenshots
          path: samples/web-demo/test-results/
          if-no-files-found: ignore
