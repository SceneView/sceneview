name: PR Check

# Fast pre-flight checks for every pull request.
#
# Slimmed in 2026-05-15 to remove duplication with ci.yml — the
# `compile-android`, `lint`, `compile-web-demo`, and `build-flutter-demo`
# jobs all duplicated work done by ci.yml's `build`, `web-desktop`, and
# `flutter-demo` jobs respectively. Only checks NOT covered by ci.yml or
# quality-gate.yml remain here. See CHANGELOG note for v4.3.4.

on:
  pull_request:
    branches: [main]
    # Skip pure docs/marketing/branding PRs — none of the remaining jobs
    # (deprecated-API guard, sceneview-skill drift, KMP all-targets compile,
    # workflow shellcheck, demo-asset validator) exercise anything those
    # paths touch. Mirrors the filter on ci.yml + quality-gate.yml so a
    # README typo PR no longer spins up the ~5 min Gradle KMP compile.
    paths-ignore:
      - 'website-static/**'
      - 'docs/**'
      - 'marketing/**'
      - 'branding/**'
      # `.claude/**` (scripts/skill/plans) and `tools/**` (build utilities)
      # are not exercised by any job here — the repo-hygiene gates read
      # `.claude/scripts/*.sh` but a *change* to those scripts is validated
      # by quality-gate.yml, not pr-check.yml. Mirrors ci.yml's ignore list
      # so a scripts-only PR (the PR #1304 profile) no longer spins up the
      # ~5 min KMP compile. Closes #1311 gap #1.
      # ⛔ Do NOT add `.github/workflows/**` — a CI change must re-run CI.
      - '.claude/**'
      - 'tools/**'
      - '*.md'
      - 'llms*.txt'
      - 'LICENSE'
  workflow_dispatch:

# Cancel in-progress runs for the same PR to save resources
concurrency:
  group: pr-check-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  # ── Repo hygiene checks ─────────────────────────────────────────────────
  # One job consolidating the 5 micro grep/validate gates that used to each
  # surface as their own top-level status check (see #1305). Each gate runs
  # as a sequential step; `if: always()` on the later steps means a PR
  # author sees EVERY violation in a single run instead of fixing them one
  # check at a time. The job still fails red if any gate fails because each
  # step's non-zero exit propagates to the job result.
  #
  # The 5 gates merged here (formerly standalone jobs):
  #   - Check for deprecated SceneView API refs
  #   - Check SceneView agent skill is in sync with source
  #   - Forbid archived sceneview-swift mirror URLs
  #   - Validate demo app asset references
  #   - Validate workflow shell blocks (dash + shellcheck)
  #
  # NOTE FOR MAINTAINERS: if any of those 5 old check NAMES was a required
  # status check in the branch-protection rule for `main`, update the rule
  # to require `Repo hygiene checks` instead — otherwise PRs will sit
  # forever waiting on a check name that no longer exists.
  #
  # Don't write deprecated composable names verbatim in these comments —
  # check-deprecated-api.sh greps source files and would flag the comment
  # itself, as it did on commit ae433620.
  repo-hygiene:
    name: Repo hygiene checks
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6

      # Deprecated API regression detector — sub-second guard against AI
      # sessions reintroducing the pre-v3.6 composable names (renamed in
      # commit e6a26a06).
      - name: Check for deprecated SceneView API refs
        shell: bash
        run: bash .claude/scripts/check-deprecated-api.sh --all

      # SceneView agent skill drift detector — catches hallucinated APIs in
      # agents/sceneview/ (e.g. `rememberARSession` or `AnchorNode.image()`)
      # BEFORE merge — see PR #1072 for the kind of drift this prevents.
      - name: Check SceneView agent skill is in sync with source
        if: always()
        shell: bash
        run: bash .claude/scripts/check-sceneview-skill.sh

      # Archived SPM mirror URL guard — the `sceneview/sceneview-swift` SPM
      # mirror was archived in PR #1215; SceneViewSwift now resolves from the
      # monorepo root Package.swift. Any NEW reference to the dead mirror URL
      # points users at a dead resolution path. Closes #1237.
      - name: Forbid archived sceneview-swift mirror URLs
        if: always()
        shell: bash
        run: bash .claude/scripts/check-sceneview-swift-urls.sh

      # Workflow shell-block validation — pre-validates `script:` blocks in
      # every .github/workflows/*.yml against `dash` so we catch bashisms
      # before they ship to CI. Closes #1114.
      - name: Install dash + shellcheck
        if: always()
        shell: bash
        run: |
          # Both ship in ubuntu-latest, but pin explicitly so the job is
          # self-contained on any runner image refresh.
          if ! command -v dash >/dev/null 2>&1; then
            sudo apt-get update -qq
            sudo apt-get install -y -qq dash
          fi
          if ! command -v shellcheck >/dev/null 2>&1; then
            sudo apt-get update -qq
            sudo apt-get install -y -qq shellcheck
          fi
          # PyYAML — already in the runner image, but assert.
          # Fallback deps live in a requirements file so Dependabot tracks them (#1286).
          python3 -c "import yaml" || pip install --quiet -r .github/workflows/requirements/pr-check.txt

      - name: Validate workflow shell blocks (dash + shellcheck)
        if: always()
        shell: bash
        run: bash .claude/scripts/check-workflow-scripts.sh

      # Demo app asset integrity — catches broken model/HDR references in
      # any samples/* demo app, both for bundled file paths and CDN URLs.
      # Self-test first so a regressed validator can't report a false PASS.
      - name: Self-test validate-demo-assets.sh
        if: always()
        shell: bash
        run: bash .claude/scripts/test-validate-demo-assets.sh

      - name: Validate demo app asset references
        if: always()
        shell: bash
        run: bash .claude/scripts/validate-demo-assets.sh

  # ── Path-filter gate ────────────────────────────────────────────────────
  # Computes whether a PR touched any code that affects the Kotlin/Native
  # compilation of `sceneview-core`. The workflow-level `paths-ignore` above
  # already drops pure docs/website/scripts PRs; this finer per-job gate
  # stops, for example, a Flutter-only or iOS-demo-only PR from running the
  # ~5 min KMP compile below. Reuses the `dorny/paths-filter` pattern from
  # ci.yml's `changes` job. Closes #1311 gap #2.
  #
  # A job that gets `if:`-skipped reports the "skipped" conclusion, which
  # GitHub treats as success — `main` has no required-check list, so this is
  # safe and no check hangs pending.
  changes:
    name: Detect changed paths
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      kmp: ${{ steps.filter.outputs.kmp }}
    steps:
      - uses: actions/checkout@v6
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          # `kmp` covers everything that affects Kotlin/Native compilation of
          # sceneview-core: the KMP module itself, the Android consumers that
          # share its source set, sceneview-web, and the Gradle build files.
          # The workflow + its composite action are listed so a CI change
          # always re-runs this job. `push` events have no PR diff base —
          # the action falls back to the previous commit; pr-check.yml only
          # triggers on pull_request anyway.
          filters: |
            kmp:
              - '.github/workflows/pr-check.yml'
              - '.github/actions/setup-gradle/**'
              - 'sceneview-core/**'
              - 'arsceneview/**'
              - 'sceneview/**'
              - 'sceneview-web/**'
              - 'gradle/**'
              - 'build.gradle*'
              - 'settings.gradle*'
              - 'gradle.properties'
              - 'gradlew'
              - 'gradlew.bat'

  # ── KMP core (iOS-only native targets) ──────────────────────────────────
  # ci.yml already builds the JVM/JS KMP targets: `web-desktop` compiles
  # `:sceneview-core:jsMainClasses` and runs `:sceneview-core:jsTest`, and
  # `build` consumes the JVM/Android target via `assembleDebug`. The ONLY
  # KMP targets nothing else exercises on PR are the iOS Kotlin/Native ones
  # (`ios.yml` builds the Swift package, not the KMP native targets), so
  # this job is narrowed to them — the unique PR-time guard on Kotlin/Native
  # compilation. Closes #1311 gaps #3 + #4.
  compile-kmp:
    name: Compile KMP core
    needs: changes
    if: needs.changes.outputs.kmp == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v6

      - uses: ./.github/actions/setup-gradle

      - name: Compile KMP core (iOS Kotlin/Native targets)
        run: |
          ./gradlew \
            :sceneview-core:compileKotlinIosArm64 \
            :sceneview-core:compileKotlinIosSimulatorArm64 \
            :sceneview-core:compileKotlinIosX64 \
            --stacktrace
