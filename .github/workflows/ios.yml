name: iOS CI

on:
  # `sceneview-core/**` is shared KMP logic consumed by the Apple
  # (RealityKit) renderer, so an iOS-affecting core change must re-run
  # iOS CI — it also triggers Android CI in ci.yml's path filter. See #1295.
  push:
    branches: [main]
    paths:
      - 'SceneViewSwift/**'
      - 'samples/ios-demo/**'
      - 'sceneview-core/**'
      - '.github/workflows/ios.yml'
  pull_request:
    branches: [main]
    paths:
      - 'SceneViewSwift/**'
      - 'samples/ios-demo/**'
      - 'sceneview-core/**'
      - '.github/workflows/ios.yml'
  workflow_dispatch:

# Cancel in-progress runs for the same branch/PR
concurrency:
  group: ios-ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  build:
    name: Build & Test (iOS)
    runs-on: macos-15
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v6

      - name: Select Xcode
        run: |
          sudo xcode-select -s /Applications/Xcode_26.3.app/Contents/Developer 2>/dev/null \
            || sudo xcode-select -s /Applications/Xcode_26.2.app/Contents/Developer 2>/dev/null \
            || sudo xcode-select -s /Applications/Xcode_26.1.1.app/Contents/Developer 2>/dev/null \
            || sudo xcode-select -s /Applications/Xcode_26.0.1.app/Contents/Developer 2>/dev/null \
            || sudo xcode-select -s /Applications/Xcode.app/Contents/Developer
          echo "Using Xcode: $(xcode-select -p)"
          xcodebuild -version

      - name: Cache Swift Package dependencies
        uses: actions/cache@v5
        with:
          path: SceneViewSwift/.build
          key: spm-${{ runner.os }}-${{ hashFiles('SceneViewSwift/Package.resolved') }}
          restore-keys: |
            spm-${{ runner.os }}-

      - name: Build Swift Package (iOS)
        working-directory: SceneViewSwift
        run: |
          xcodebuild build \
            -scheme SceneViewSwift \
            -destination 'platform=iOS Simulator,name=iPhone 16 Pro,OS=latest' \
            -skipMacroValidation \
            | xcpretty --color 2>/dev/null || cat

      - name: Run tests
        working-directory: SceneViewSwift
        run: |
          xcodebuild test \
            -scheme SceneViewSwift \
            -destination 'platform=iOS Simulator,name=iPhone 16 Pro,OS=latest' \
            -skipMacroValidation \
            | xcpretty --color 2>/dev/null || cat

      # Build the iOS sample demo so a missing pbxproj registration on a new
      # demo file fails the PR instead of slipping into main. Caught by
      # Thomas's "tester visuellement impérativement" rule on PR #1042 (file
      # added but not in pbxproj → main broken until 74dccb56). Closes #1044.
      #
      # `if: always()` on all three steps so the demo build runs even when
      # the SwiftPM tests above flake — pbxproj regressions are orthogonal
      # to test correctness, and flaky simulator tests should not hide
      # demo build failures. The overall job status still goes red if any
      # step fails (no `continue-on-error: true`), so a real test failure
      # still blocks merge — this just ensures both signals are surfaced.
      - name: Cache iOS demo Swift Package dependencies
        if: always()
        uses: actions/cache@v5
        with:
          path: samples/ios-demo/SourcePackages
          # `hashFiles()` must point at a file that exists at checkout time
          # (#1360). The previous key targeted the workspace-scoped
          # `xcshareddata/swiftpm/Package.resolved`, which Xcode only writes
          # *during* `-resolvePackageDependencies` — so on a clean runner
          # the file is absent, `hashFiles()` returns an empty string, and
          # the key is the constant `spm-<os>-demo-` for every run (no cache
          # invalidation when dependencies change). The checked-in resolved
          # file lives at `samples/ios-demo/Package.resolved`; hash that.
          key: spm-${{ runner.os }}-demo-${{ hashFiles('samples/ios-demo/Package.resolved') }}
          restore-keys: |
            spm-${{ runner.os }}-demo-

      - name: Resolve iOS demo dependencies
        if: always()
        working-directory: samples/ios-demo
        run: |
          xcodebuild -resolvePackageDependencies \
            -scheme SceneViewDemo \
            -project SceneViewDemo.xcodeproj \
            -clonedSourcePackagesDirPath SourcePackages

      - name: Build & test iOS sample demo (catches missing pbxproj entries)
        if: always()
        # `xcodebuild test` builds the demo AND runs the `SceneViewDemoTests`
        # unit-test target (wired in #1227) — so a missing pbxproj registration
        # on a new demo file still fails the PR, and the AppStoreUpdater tests
        # now run on every PR.
        #
        # Inject `SKETCHFAB_API_KEY` so the `Info.plist` placeholder
        # substitution path (introduced for #1157) is exercised on every CI
        # build, not just on `xcodebuild archive` in `app-store.yml`. Forks
        # without the secret get an empty string — `SketchfabConfig.swift`
        # silently falls back to `nil`, matching the existing graceful
        # degradation in `ExploreTab.swift`.
        env:
          SKETCHFAB_API_KEY: ${{ secrets.SKETCHFAB_API_KEY }}
        working-directory: samples/ios-demo
        run: |
          xcodebuild test \
            -project SceneViewDemo.xcodeproj \
            -scheme SceneViewDemo \
            -destination 'platform=iOS Simulator,name=iPhone 16 Pro,OS=latest' \
            -clonedSourcePackagesDirPath SourcePackages \
            -skipPackagePluginValidation \
            -skipMacroValidation \
            SKETCHFAB_API_KEY="$SKETCHFAB_API_KEY" \
            | xcpretty --color 2>/dev/null || cat
