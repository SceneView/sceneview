name: Deploy website + docs

# This is the SINGLE workflow that publishes the user-facing site at
# https://sceneview.github.io. It assembles ONE complete `site/` tree —
# marketing landing page (root) + MkDocs technical docs (/docs/) +
# Kotlin/JS web-demo (/web-demo/) + Dokka API reference (/api/sceneview/) —
# and pushes it to the external `sceneview/sceneview.github.io` repo.
#
# Why a single workflow: `deploy-website.yml` previously published ONLY
# `website-static/` to the same external repo with `keep_files: true`,
# while this workflow deployed the full `site/` to the *project* Pages of
# `sceneview/sceneview` (a different host). The result was that
# `sceneview.github.io/docs/` and `/api/` never received the MkDocs /
# Dokka content — GitHub Pages' 404 fallback served the landing page
# byte-for-byte for every unknown route (#925). `deploy-website.yml` is
# now retired; this workflow is authoritative.

on:
  # Path-gated so a pure-code merge to main does NOT redeploy the
  # website + docs (#1311, #1321). The repo runs a continuous
  # high-merge-rate cycle — a Pages rebuild only adds value when
  # documentation or website content actually changes.
  #   - `**/*.md` covers CHANGELOG.md / MIGRATION.md / CONTRIBUTING.md
  #     (synced into the MkDocs site) plus marketing/codelabs/*.md.
  #   - the workflow file itself is listed so changes to the deploy
  #     logic re-run it.
  push:
    branches: [main]
    paths:
      - 'docs/**'
      - 'website-static/**'
      - 'llms.txt'
      - '**/*.md'
      - '.github/workflows/docs.yml'
  release:
    types: [published]
  workflow_call:
  workflow_dispatch:

# Allow only one concurrent deployment, skip in-progress runs
concurrency:
  group: pages
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  build:
    name: Build website + docs
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v6

      # ── 1. Copy static website (marketing site — root) ─────────────────
      - name: Assemble site root from static HTML
        run: |
          mkdir -p site

          # Static HTML/CSS/JS landing page.
          cp -r website-static/* site/

          # Defensive: `site/docs/` is owned exclusively by the MkDocs
          # build (step 2). `website-static/` must not pre-seed it — a
          # legacy `website-static/docs/index.html` redirect stub used to
          # do exactly that and shadow the real docs (#925). The stub has
          # been removed from source; this guards against it returning.
          rm -rf site/docs

          touch site/.nojekyll

      # ── 2. Build MkDocs (technical docs — /docs/) ───────────────────────
      - uses: actions/setup-python@v6
        with:
          python-version: '3.13'

      - name: Install MkDocs
        run: |
          # Deps live in requirements files so Dependabot can track/bump them (#1286).
          pip install -r .github/workflows/requirements/docs.txt
          # mkdocs-material[imaging] enables social card previews (optional, needs Cairo)
          pip install -r .github/workflows/requirements/docs-imaging.txt 2>/dev/null || true

      - name: Sync content into docs
        run: |
          if [ -d marketing/codelabs ]; then
            mkdir -p docs/docs/codelabs
            cp marketing/codelabs/codelab-3d-compose.md docs/docs/codelabs/codelab-3d-compose.md 2>/dev/null || true
            cp marketing/codelabs/codelab-ar-compose.md docs/docs/codelabs/codelab-ar-compose.md 2>/dev/null || true
          fi
          cp MIGRATION.md docs/docs/migration.md 2>/dev/null || true
          cp CHANGELOG.md docs/docs/changelog.md 2>/dev/null || true
          cp CONTRIBUTING.md docs/docs/contributing.md 2>/dev/null || true

      - name: Build MkDocs
        run: |
          cd docs
          mkdocs build --site-dir ../site/docs

      # ── 3. Copy extra files ─────────────────────────────────────────────
      - name: Copy SEO and meta files
        run: |
          # Copy SEO files from docs if not in website-static
          for f in CNAME llms.txt llms-full.txt; do
            [ ! -f "site/$f" ] && [ -f "docs/docs/$f" ] && cp "docs/docs/$f" "site/$f" || true
          done
          # Root llms.txt
          [ ! -f "site/llms.txt" ] && [ -f "llms.txt" ] && cp llms.txt site/ || true

      # ── 3b. Build and publish samples/web-demo to /web-demo/ ────────────
      - uses: ./.github/actions/setup-gradle

      - name: Build samples/web-demo (Kotlin/JS distribution)
        run: |
          # `:samples:web-demo:jsBrowserDistribution` runs the webpack
          # production build AND copies HTML resources from
          # `src/jsMain/resources/` into the same output dir — without
          # `Distribution`, the webpack-only task drops JS only and
          # `site/web-demo/index.html` would be missing. Gradle plugin
          # writes to `build/dist/js/productionExecutable/` for the
          # Distribution task (vs `build/kotlin-webpack/js/
          # productionExecutable/` for the webpack-only one). Both
          # locations were caught by an independent review; the
          # Distribution task is the correct one for "deploy a static
          # site" because it bundles the HTML next to the JS bundle.
          # See #926.
          ./gradlew :samples:web-demo:jsBrowserDistribution --stacktrace
          mkdir -p site/web-demo
          # Defensive: support both AGP/Gradle output layouts.
          if [ -d samples/web-demo/build/dist/js/productionExecutable ]; then
            cp -r samples/web-demo/build/dist/js/productionExecutable/* site/web-demo/
          elif [ -d samples/web-demo/build/kotlin-webpack/js/productionExecutable ]; then
            cp -r samples/web-demo/build/kotlin-webpack/js/productionExecutable/* site/web-demo/
            # Webpack-only output may lack index.html — copy it from sources.
            [ -f samples/web-demo/src/jsMain/resources/index.html ] && \
              cp samples/web-demo/src/jsMain/resources/index.html site/web-demo/index.html
          else
            echo "::error::Neither expected web-demo output dir exists; aborting"
            find samples/web-demo/build/ | head -50
            exit 1
          fi
          [ -f site/web-demo/index.html ] || {
            echo "::error::site/web-demo/index.html missing — deploy would 404"; exit 1; }

      # ── 4. Include Dokka API docs ───────────────────────────────────────
      # Dokka is built and published by release.yml in its own gh-pages
      # deploy. `download-artifact` only resolves artifacts from the SAME
      # run, so this lookup never finds a cross-run `dokka-api-docs`
      # artifact — release.yml no longer uploads one. It is kept solely to
      # cover a hypothetical in-run Dokka build; in practice it always
      # falls through to the `Preserve` step below, which carries the
      # already-published `/api/` tree forward. See #1500.
      - name: Download Dokka API docs (if available)
        id: dokka
        uses: actions/download-artifact@v8
        with:
          name: dokka-api-docs
          path: site/api/sceneview
        continue-on-error: true

      # The deploy step replaces the published tree wholesale
      # (`keep_files: false`). If this run has no fresh Dokka artifact we
      # must carry over the API docs already live on sceneview.github.io,
      # otherwise a docs-only deploy would wipe `/api/` — the exact
      # 404-class regression #925 is about.
      - name: Preserve already-published Dokka API docs
        if: steps.dokka.outcome != 'success'
        run: |
          if find site/api/sceneview -mindepth 1 -print -quit 2>/dev/null | grep -q .; then
            echo "Dokka artifact present — nothing to preserve."
            exit 0
          fi
          echo "No fresh Dokka artifact; pulling /api/ from the live site."
          tmp="$(mktemp -d)"
          if git clone --depth 1 --branch main \
              https://github.com/sceneview/sceneview.github.io.git "$tmp" 2>/dev/null \
              && [ -d "$tmp/api" ]; then
            rm -rf site/api
            cp -r "$tmp/api" site/api
            echo "Carried over existing /api/ from sceneview.github.io."
          else
            echo "::warning::Could not fetch existing /api/; this deploy will not include API docs."
          fi
          rm -rf "$tmp"

      # ── 5. Verify the assembled tree ────────────────────────────────────
      - name: Verify build
        run: |
          FILE_COUNT=$(find site -type f | wc -l)
          echo "Site contains $FILE_COUNT files"
          echo "Root files: $(ls site/)"
          if [ "$FILE_COUNT" -lt 10 ]; then
            echo "::error::Site build produced fewer than 10 files. Aborting."
            exit 1
          fi
          # The landing page must own the root. The MkDocs docs site and
          # the web-demo must own their own sub-paths with their own
          # index.html — otherwise GitHub Pages' 404 fallback serves the
          # landing page byte-for-byte for those routes (#925).
          fail=0
          for path in index.html docs/index.html web-demo/index.html; do
            if [ -f "site/$path" ]; then
              echo "OK   site/$path"
            else
              echo "::error::Missing site/$path — that route would 404 / fall back to the landing page (#925)"
              fail=1
            fi
          done
          # Dokka API docs are downloaded from a separate artifact and may
          # legitimately be absent on a docs-only run — warn, don't fail.
          if [ -f site/api/sceneview/index.html ]; then
            echo "OK   site/api/sceneview/index.html"
          else
            echo "::warning::site/api/sceneview/index.html missing — Dokka artifact was not available for this run; /api/sceneview/ will 404 until a release run publishes it"
          fi
          [ "$fail" -eq 0 ] || exit 1

      - name: Upload assembled site artifact
        uses: actions/upload-artifact@v7
        with:
          name: sceneview-site
          path: site
          retention-days: 1

  deploy:
    name: Deploy to sceneview.github.io
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 10
    # Cross-workflow serialisation (#1417). Both this job and release.yml's
    # `publish-api-docs` job push to the external `sceneview/sceneview.github.io`
    # repo. On a release tag both workflows fire at once and the second push is
    # rejected (non-fast-forward) → `failed to push some refs`. A job-level
    # `concurrency` group is shared ACROSS workflows when the group name
    # matches, so naming both deploy jobs identically forces them to run one at
    # a time. `cancel-in-progress: false` — never cancel an in-flight site
    # deploy; queue behind it.
    concurrency:
      group: sceneview-github-io-deploy
      cancel-in-progress: false
    steps:
      - name: Download assembled site artifact
        uses: actions/download-artifact@v8
        with:
          name: sceneview-site
          path: site

      # Publish the COMPLETE assembled tree (landing page + /docs/ +
      # /web-demo/ + /api/sceneview/) to the user-facing repo. This is the
      # only deploy that reaches https://sceneview.github.io.
      #
      # The `site/` tree is complete: the build job's "Download Dokka API
      # docs" step already placed the API reference under `site/api/`
      # before uploading the `sceneview-site` artifact.
      #
      # `keep_files: false` — the assembled `site/` IS the full intended
      # tree, so a clean replace prevents stale files (e.g. the old
      # redirect stub at `docs/index.html`) from lingering on the
      # published branch and shadowing the new content.
      - name: Deploy to sceneview/sceneview.github.io
        uses: peaceiris/actions-gh-pages@v4
        with:
          deploy_key: ${{ secrets.PAGES_DEPLOY_KEY }}
          external_repository: sceneview/sceneview.github.io
          publish_branch: main
          publish_dir: ./site
          keep_files: false
          commit_message: "deploy: ${{ github.event.head_commit.message || github.sha }}"
          user_name: github-actions[bot]
          user_email: github-actions[bot]@users.noreply.github.com

      # GitHub Pages' legacy auto-build on `sceneview/sceneview.github.io`
      # has been intermittently failing to fire on the push above
      # (verified 2026-05-07). Force a build via the Pages API. Requires a
      # PAT in `secrets.PAGES_REBUILD_TOKEN` with `repo` scope — falls
      # through silently if the secret isn't set, in which case run:
      #   gh api -X POST repos/sceneview/sceneview.github.io/pages/builds
      - name: Trigger GitHub Pages build (workaround for auto-build skip)
        if: ${{ env.PAGES_TOKEN != '' }}
        env:
          PAGES_TOKEN: ${{ secrets.PAGES_REBUILD_TOKEN }}
        continue-on-error: true
        run: |
          curl -sSf -X POST \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer $PAGES_TOKEN" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            https://api.github.com/repos/sceneview/sceneview.github.io/pages/builds \
            | head -c 200
