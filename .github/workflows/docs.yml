name: Deploy website + docs

on:
  push:
    branches: [main]
    paths:
      - 'website-static/**'
      - 'docs/**'
      - 'marketing/**'
      - 'samples/web-demo/**'
      - 'sceneview-web/**'
      - 'llms.txt'
      - 'CHANGELOG.md'
      - 'MIGRATION.md'
      - 'CONTRIBUTING.md'
  release:
    types: [published]
  workflow_call:
  workflow_dispatch:

# Allow only one concurrent deployment, skip in-progress runs
concurrency:
  group: pages
  cancel-in-progress: true

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    name: Build website + docs
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v6

      # ── 1. Copy static website (marketing site — root) ─────────────────
      - name: Assemble site root from static HTML
        run: |
          mkdir -p site

          # Static HTML/CSS/JS landing page
          cp -r website-static/* site/

          touch site/.nojekyll

      # ── 2. Build MkDocs (technical docs — /docs/) ───────────────────────
      - uses: actions/setup-python@v6
        with:
          python-version: '3.13'

      - name: Install MkDocs
        run: |
          pip install mkdocs-material
          # mkdocs-material[imaging] enables social card previews (optional, needs Cairo)
          pip install "mkdocs-material[imaging]" 2>/dev/null || true

      - name: Sync content into docs
        run: |
          if [ -d marketing/codelabs ]; then
            mkdir -p docs/docs/codelabs
            cp marketing/codelabs/codelab-3d-compose.md docs/docs/codelabs/codelab-3d-compose.md 2>/dev/null || true
            cp marketing/codelabs/codelab-ar-compose.md docs/docs/codelabs/codelab-ar-compose.md 2>/dev/null || true
          fi
          cp MIGRATION.md docs/docs/migration.md 2>/dev/null || true
          cp CHANGELOG.md docs/docs/changelog.md 2>/dev/null || true
          cp CONTRIBUTING.md docs/docs/contributing.md 2>/dev/null || true

      - name: Build MkDocs
        run: |
          cd docs
          mkdocs build --site-dir ../site/docs

      # ── 3. Copy extra files ─────────────────────────────────────────────
      - name: Copy SEO and meta files
        run: |
          # Copy SEO files from docs if not in website-static
          for f in CNAME llms.txt llms-full.txt; do
            [ ! -f "site/$f" ] && [ -f "docs/docs/$f" ] && cp "docs/docs/$f" "site/$f" || true
          done
          # Root llms.txt
          [ ! -f "site/llms.txt" ] && [ -f "llms.txt" ] && cp llms.txt site/ || true

      # ── 3b. Build and publish samples/web-demo to /web-demo/ ────────────
      - uses: ./.github/actions/setup-gradle

      - name: Build samples/web-demo (Kotlin/JS distribution)
        run: |
          # `:samples:web-demo:jsBrowserDistribution` runs the webpack
          # production build AND copies HTML resources from
          # `src/jsMain/resources/` into the same output dir — without
          # `Distribution`, the webpack-only task drops JS only and
          # `site/web-demo/index.html` would be missing. Gradle plugin
          # writes to `build/dist/js/productionExecutable/` for the
          # Distribution task (vs `build/kotlin-webpack/js/
          # productionExecutable/` for the webpack-only one). Both
          # locations were caught by an independent review; the
          # Distribution task is the correct one for "deploy a static
          # site" because it bundles the HTML next to the JS bundle.
          # See #926.
          ./gradlew :samples:web-demo:jsBrowserDistribution --stacktrace
          mkdir -p site/web-demo
          # Defensive: support both AGP/Gradle output layouts.
          if [ -d samples/web-demo/build/dist/js/productionExecutable ]; then
            cp -r samples/web-demo/build/dist/js/productionExecutable/* site/web-demo/
          elif [ -d samples/web-demo/build/kotlin-webpack/js/productionExecutable ]; then
            cp -r samples/web-demo/build/kotlin-webpack/js/productionExecutable/* site/web-demo/
            # Webpack-only output may lack index.html — copy it from sources.
            [ -f samples/web-demo/src/jsMain/resources/index.html ] && \
              cp samples/web-demo/src/jsMain/resources/index.html site/web-demo/index.html
          else
            echo "::error::Neither expected web-demo output dir exists; aborting"
            ls -R samples/web-demo/build/ | head -50
            exit 1
          fi
          [ -f site/web-demo/index.html ] || {
            echo "::error::site/web-demo/index.html missing — deploy would 404"; exit 1; }

      # ── 4. Include Dokka API docs if available ──────────────────────────
      - name: Download Dokka API docs (if available)
        uses: actions/download-artifact@v8
        with:
          name: dokka-api-docs
          path: site/api/sceneview
        continue-on-error: true

      # ── 5. Verify and upload ────────────────────────────────────────────
      - name: Verify build
        run: |
          FILE_COUNT=$(find site -type f | wc -l)
          echo "Site contains $FILE_COUNT files"
          echo "Root files: $(ls site/)"
          echo "Has index.html: $([ -f site/index.html ] && echo YES || echo NO)"
          echo "Has docs/: $([ -d site/docs ] && echo YES || echo NO)"
          if [ "$FILE_COUNT" -lt 10 ]; then
            echo "ERROR: Site build produced fewer than 10 files. Aborting."
            exit 1
          fi
          if [ ! -f site/index.html ]; then
            echo "ERROR: No index.html in root. Static site copy may have failed."
            exit 1
          fi

      - name: Configure Pages
        uses: actions/configure-pages@v6

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: site

  deploy:
    name: Deploy to GitHub Pages
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 10
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
        # Retry once if a concurrent deployment caused a conflict
      - name: Retry deploy (if first attempt failed)
        if: failure()
        uses: actions/deploy-pages@v5
