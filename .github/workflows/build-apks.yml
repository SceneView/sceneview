name: Build sample APKs

on:
  # PRs are NOT triggered here — ci.yml's `build` job already builds the
  # same APKs via `:samples:android-demo:assembleDebug` on every PR. This
  # workflow now only produces the artifact-uploaded + release-attached APKs
  # on main and tag pushes, which is the only unique value vs ci.yml's build.
  #
  # Strictly path-gated (#1311, #1321): SKIPPED on doc-only, CI-only
  # (`.github/**`), and `mcp/`-only merges — none of those change the
  # built APKs. Still runs on every real code/build-script change to
  # `main` so squash-merged integration regressions are caught.
  push:
    branches: [main]
    paths:
      - 'sceneview/**'
      - 'arsceneview/**'
      - 'sceneview-core/**'
      - 'samples/**'
      - 'gradle/**'
      - 'build.gradle*'
      - 'settings.gradle*'
      - 'gradle.properties'
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'
  workflow_dispatch:

# Cancel in-progress runs for the same branch/PR
concurrency:
  group: build-apks-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build sample APKs
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v6

      - uses: ./.github/actions/setup-gradle

      - name: Build all sample APKs
        env:
          # Optional. When unset (forks, PRs from forks), the demo's runtime
          # check disables Streetscape / Geospatial / Cloud Anchors gracefully.
          ARCORE_API_KEY: ${{ secrets.ARCORE_API_KEY }}
          # Optional. When unset, the demo's Sketchfab gallery falls back to
          # the bundled featured models and disables search. See
          # samples/android-demo/.../sketchfab/ for the BuildConfig wiring.
          SKETCHFAB_API_KEY: ${{ secrets.SKETCHFAB_API_KEY }}
        run: |
          ./gradlew \
            :samples:android-demo:assembleDebug \
            :samples:android-tv-demo:assembleDebug \
            --console=plain

      - name: Collect APKs
        run: |
          mkdir -p dist
          for sample in android-demo android-tv-demo; do
            apk=$(find "samples/$sample/build/outputs/apk/debug" -name "*.apk" | head -1)
            if [ -n "$apk" ]; then
              cp "$apk" "dist/sceneview-${sample}.apk"
            fi
          done

      - name: Upload APKs
        uses: actions/upload-artifact@v7
        with:
          name: sample-apks
          path: dist/*.apk
          if-no-files-found: warn
          retention-days: 90

      - name: Attach to GitHub Release
        if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v3
        with:
          files: dist/*.apk
