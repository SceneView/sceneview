name: quality-gate

# Full pre-merge verification: runs the same .claude/scripts/quality-gate.sh
# that contributors run locally before pushing. Includes:
#   - Version sync across all modules
#   - Security checks (no secrets, no tracked local.properties)
#   - Deprecated SceneView API detector (Scene{}/ARScene{} regressions)
#   - Demo app asset integrity (bundled refs + CDN URLs)
#   - Android assembleDebug + unit tests
#   - MCP unit tests
#   - Website asset rules (no Google Fonts, Three.js, model-viewer, CDNs)
#
# Two-tier strategy:
#   - pr-check.yml runs the deprecated-API detector early (~1s) for fast fail.
#   - quality-gate.yml runs the full gate (~5-10 min) on every PR + push to main.

on:
  pull_request:
    branches: [main]
    # Skip docs-only PRs — quality-gate.sh builds Android + runs unit + MCP
    # tests, none of which are affected by README/CHANGELOG/website edits.
    # Mirrors the filter on ci.yml. NOTE: do NOT add `mcp*/**` here — the
    # gate explicitly runs MCP unit tests. Closes #1117.
    paths-ignore:
      - 'website-static/**'
      - 'docs/**'
      - 'marketing/**'
      - 'branding/**'
      - '*.md'
      - 'llms*.txt'
      - 'LICENSE'
  push:
    branches: [main]
    paths-ignore:
      - 'website-static/**'
      - 'docs/**'
      - 'marketing/**'
      - 'branding/**'
      - '*.md'
      - 'llms*.txt'
      - 'LICENSE'
  workflow_dispatch:

# One run per ref; cancel older in-progress runs to save resources.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  quality-gate:
    name: Quality gate (full)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    continue-on-error: false

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          # Full history so quality-gate.sh can run git diff/ls-files against
          # main and so version checks can resolve historical refs.
          fetch-depth: 0

      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 21

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v6
        with:
          # PRs read the cache (no writes from forks). Pushes to main repopulate it.
          # Uses gradle/actions/setup-gradle@v6 (not the `cache: gradle` shortcut
          # on setup-java) because this workflow runs the full quality gate
          # — a build-scan-aware Gradle setup gives us richer cache hits than
          # the lightweight wrapper-only cache.
          cache-read-only: ${{ github.event_name != 'push' }}

      - uses: ./.github/actions/setup-mcp

      - name: Set up Android SDK
        uses: android-actions/setup-android@v4

      - name: Write local.properties
        # quality-gate.sh invokes ./gradlew, which needs sdk.dir on Linux runners.
        run: echo "sdk.dir=$ANDROID_HOME" > local.properties

      - name: Make gradlew executable
        run: chmod +x ./gradlew

      - name: Run quality gate
        shell: bash
        env:
          # Optional. Demo runtime disables Geospatial when unset.
          ARCORE_API_KEY: ${{ secrets.ARCORE_API_KEY }}
          # ci.yml's `build` job already runs `assembleDebug` + the same
          # unit-test set + JaCoCo coverage in parallel with this gate.
          # Skipping the duplicate Android build/test work here keeps the
          # gate focused on what it owns uniquely: version sync, security
          # scans, asset CDN integrity, website rules, MCP tests, agent
          # skill drift. Trims ~5 min from every PR and push. The full
          # build/test path still runs end-to-end locally
          # (`bash .claude/scripts/quality-gate.sh`) — only the CI
          # invocation skips it.
          QUALITY_GATE_SKIP_ANDROID: "1"
        run: bash .claude/scripts/quality-gate.sh

      - name: Upload validate-demo-assets log
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: validate-demo-assets-log
          path: /tmp/validate-demo-assets.log
          if-no-files-found: ignore
          retention-days: 7

      - name: Upload check-deprecated-api log
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: check-deprecated-api-log
          path: /tmp/check-deprecated-api.log
          if-no-files-found: ignore
          retention-days: 7

      - name: Upload check-sceneview-skill log
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: check-sceneview-skill-log
          path: /tmp/check-sceneview-skill.log
          if-no-files-found: ignore
          retention-days: 7
